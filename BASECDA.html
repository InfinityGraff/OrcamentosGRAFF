<script>
    // Id, Data, Clnt, Serv, Tipo, Qnt, Lag, Alt, Desc, Surg, Valr, TArt, Dsng, Arte, CArt, Grad, Gimg, Forn, OS, Uber, Cbmt, VCbt, OK, Entg, Detg, Cmnt, Stts, Lixo
    let ValCount = {}

    async function CarregaTabela(){
        let dados=[]
        for(let i=0;i<3000;i+=1000){
            const {data,error}=await supaBASE.from("ARTE").select("*").order("Id",{ascending:true}).range(i,i+999)
            if(error) return console.error(error)
            dados=dados.concat(data)
        }

        console.log(dados)
        

        const cols=Object.keys(dados[0])
        Tabela.innerHTML=`<table>
            <thead class="Stky"><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead>
            <tbody>${dados.map(r=>`<tr>${
                cols.map(c=>`<td contenteditable="true" class="${ValidaCel(c,r[c])?"Tyu":""}" onblur="EditaCel(this,'${r.Id}','${c}')">${
                typeof r[c]=="object" ? JSON.stringify(r[c]) : (r[c]??"")}</td>`).join("")}</tr>`).join("")}
            </tbody>
            <tfoot class="Stky2">${cols.map(c=>`<td>${ValCount[c]||0}</td>`).join("")}</tfoot>
        </table>`
    }

    function ValidaCel(col,val){
        let erro = false
        if(["Stts","Lcro","Deve","Valr","Cust"].includes(col)) erro = val!==null && val!==""
        else if(col=="Data") erro = !/^\d{4}-\d{2}-\d{2}$/.test(val) && val!==null && val!==""
        else if(col=="Id") erro = isNaN(Number(val))
        if(erro){ ValCount[col] = (ValCount[col]||0) + 1}
        return erro
    }

    async function EditaCel(td,id,col){
        let  val= td.innerText.trim()
        try{ val= JSON.parse(val)}catch{}
        const {error}=await supaBASE.from("PDDS").update({[col]:val}).eq("Id",id)
        if(error){console.error(error)}else{LOG(`coluna ${col}-${id} - foi Editada`)}
    }

    CarregaTabela()




    

</script>
