<script>
    function PrepDrop2(Eu,m=0){
        Inn(Eu,`<div class="P Ct gap"></div><a>+ Adicionar Imagem</a><input type=file accept=image/* ${m?'multiple':''} class=NONE>`)
        let f=$('input',Eu),a=$('a',Eu),p=$('.P',Eu),
        add=F=>{if(!F)return;let b=document.createElement('div'),u=URL.createObjectURL(F)
            b.innerHTML=`<img src="${u}"><i>X</i>`,$('i',b).onclick=_=>b.remove()
            if(!m)p.replaceChildren();p.appendChild(b)},
        imp=fs=>[...fs].map(add)
        a.onclick=_=>f.click()
        f.onchange=e=>(imp(e.target.files),f.value='')
        Eu.ondragover=e=>(Prvn2(e),Add(Eu,'hover'))
        Eu.ondragleave=_=>Rmv(Eu,'hover')
        Eu.ondrop=e=>(Prvn2(e),Rmv(Eu,'hover'),imp(e.dataTransfer.files))
    }
</script>

    const MediaRank=(Arts,Tags)=>{
       return Arts.length + Tags.length // Quantidade de Arte e Quantidade de tags

    const ListaTags=(Obj)=>{
        const Lis1 = Uniq(Obj.map(e=>e.Tema).filter(Boolean))
        const Lis2 = Uniq(Obj.map(e=>e.Tipo).filter(Boolean))
        return [Lis1,Lis2]

    const Tm_Tags=(Obj)=>{
        const COLOR = {Gray:'#4b4b4b',Yellow:'#bb8c00',Purple:'#C77DFF'}
        return `<div class="Tags Ct gap w100" style="overflow: hidden">

    const Tm_Resumo=(E,U,Mod)=>`${E.map(e=>`
        <div class="Resumo gap Cl Bt HOV Box2 Rltv" onclick="MODAL(Tm_Exib('${U.Nome}','${e.Id}',event,'${U.cgo}'));RodarDrops()">

            <p>${e.Tipo}</p><div class="Cl Start2 ${Mod=='P'?'NONE':''}"><b>${e.Nome}</b><p>${e.Tema} • ${TempoResta(e.Prazo)}</p></div>
            <div class="${Mod=='P'?'NONE':''}">${Tm_RS2(e.Valr)}</div>
    </div>`).join("")}`

    const Tm_Exib=(U,ID,ev,cgo)=>{
        if (ev?.target.closest('button')) return
        const Admn = cgo=='Admn'
        const Obj  = J['ARTE'].find(e=>e.Id==ID)
        const ADM  = Col     =>Admn ? `data-r="ARTE-${Obj.Id}-${Col}-Edit-_-_" data-p="" contenteditable="true" onkeydown="EntBlr(this)" onblur="DTV(this);EditCell(this,'Edt')" onfocus="ATV(this)"`:''
        const ADMs = Col     =>Admn ? `data-r="ARTE-${Obj.Id}-${Col}-Slct-_-_" data-p="" contenteditable="true" onkeydown="EntBlr(this)" onblur="DTV(this);EditCell(this,'Edt')" onfocus="ATV(this)"`:''
        const ADMp = (id,Col)=>Admn ? `data-r="REGRA-${id}-${Col}-Edit-Bj-Sc" data-p="ARTE-${Obj.Id}-Regra-Edit-_-_"`:''
        const ADMP = (id,Col)=>Admn ? `data-r="REGRA-${id}-${Col}-Edit-Bj-Sc" data-p="ARTE-${Obj.Id}-Regra-Edit-_-_" contenteditable="true" onkeydown="EntBlr(this)" onblur="DTV(this);EditCell(this,'Edt')" onfocus="ATV(this)"`:''
        const ADMt = (id,Col)=>Admn ? `data-r="REGRA-${id}-${Col}-Text-Bj-Sc" data-p="ARTE-${Obj.Id}-Regra-Edit-_-_" contenteditable="true"                          onblur="DTV(this);EditCell(this,'Edt')" onfocus="ATV(this)"`:''

        const Rgr  = Obj.Regra
        const   G  = a=>`style="grid-area:${a}"`
        return `<div class="INFO">
                    <h3 class="Ct" ${G('A')} ${ADM('Nome')}>${Obj.Nome}</h3>
                    
                    <div class="F1 Box2" ${G('B')}>
                        <div ${G('A')} class="Bt"><div class="Ct">Tipo:<div>${Admn ? `<select ${ADMs('Tipo')}>${Tm_Opt(O['TArt'],Obj.Tipo)}</select>` : Obj.Tipo}</div></div><div>Arte Aberta</div><div ${ADM('Dsng')}>${Obj.Dsng}</div></div>
                        <div ${G('B')} class="Box2 RASC"     >${For(Rgr.length).map(e=>`<img class="Rascunho ${e==0?'':'none'}"             src="${BASE_URL}Dsng/${Obj.Id}_Rasc_${e+1}.webp?v=${Date.now()}">`).join('')}</div>
                        <div ${G('C')} class="Box2 LISTA1 Cl">${For(Rgr.length).map(e=>`<img class="HOV" onclick="TrocaRasc(this,'${e+1}')" src="${BASE_URL}Dsng/${Obj.Id}_Rasc_${e+1}.webp?v=${Date.now()}">`).join('')}<button>UPP</button></div>
                        <div ${G('D')} class="Box2"          ><p ${ADM('Clnt')}>${Obj.Clnt}</p> <p ${ADM('Tema')}>${Obj.Tema}</p> <div ${ADM('Data')}>${Obj.Data}</div> <div>${TempoResta(Obj.Prazo)}</div>   </div>
                        <div ${G('E')} class="Box2"          ><p ${ADM('Valr')}>${cgo=="Admn"?Obj.Valr:Tm_RS2(Obj.Valr)}</p><button>Discutir Preço</button></div>
                    </div>

                    ${Rgr.map((r,x)=>{
                        const Ettp = r.Etps.split('-')
                        const ETAP = Admn ? ['AI','UP','BG','CP','DG','VT','MK'] : Ettp
                        return `<div class="F2 Box2 ${x==0?'':'NONE'} RasC${x+1}" ${G('C')}>
                                    <div ${G('A')} class="ETAPASS Ct gap" ${ADMp(r.Id,'Etps')}><p>Rascunho: ${r.Id}</p> ${ETAP.map(k=>`<div class="Ct gap HOV ${Ettp.includes(k)?'Atv':''}" onclick="TOV(this);EditETPS(this)" name="${k}"><img src="./SVG/Dsngg/${k}.svg"><p>${ETAPASS[k]}</p></div>`).join('')}</div>
                                    <div ${G('B')} class="gap"        ><textarea ${ADMt(r.Id,'Desc')}>${r.Desc}</textarea><textarea ${ADMt(r.Id,'Info')}>${r.Info}</textarea></div>
                                    <div ${G('C')} class="Box2 Ct"    ><label>Medidas:   </label><p ${ADMP(r.Id,'Mdds')}>${r.Mdds}</p></div>    
                                    <div ${G('D')} class="Start2 Box2"><label>Elementos: </label><div class="CT LISTA w100">${For(r.Elmt).map(e=>`<img class="HOV" src="${BASE_URL}Dsng/${Obj.Id}_${x+1}_Elmt_${e+1}.webp?v=${Date.now()}">`).join('')}<div class="Drop Ct"></div></div></div>
                                    <div ${G('E')} class="Start2 Box2"><label>Referência:</label><div class="CT LISTA w100">${For(r.Refr).map(e=>`<img class="HOV" src="${BASE_URL}Dsng/${Obj.Id}_${x+1}_Refr_${e+1}.webp?v=${Date.now()}">`).join('')}<div class="Drop Ct"></div></div></div>
                                    <div ${G('F')} class="Cl"><button ${ADMp(r.Id,'Elmt')} onclick="AddNewIMG(this,'${r.Elmt}')">Elmt</button><button ${ADMp(r.Id,'Refr')} onclick="AddNewIMG(this,'${r.Refr}')">Refr</button></div>
                                </div>`
                    }).join('')}

                    <div class="F3 Box2" ${G('D')}>
                        <div ${G('A')}>${Obj.Drive ? `<a class="button" href="${Obj.Drive}" target="_blank" rel="noopener noreferrer">Abrir Link <img src="./img/Corel.webp"></a>`:'<button>Baixar</button>'}</div>
                        <div ${G('B')} class="Box2"><label class="Ct">Emvie em <p ${ADMP(Rgr[0].Id,'Form')}>${Rgr[0].Form}</p></label><input type="file" multiple accept=".pdf,.zip,.rar" onchange="FileUP(this,'ARQ',this)"></div>
                        <div ${G('C')} class="Bt">
                                ${(f=>`${f?.p ?`<button onclick="MudaSTTS('${U}','${ID}','${f.p.s}')">${f.p.t}</button>`:'.'}
                                        ${Admn?`<button onclick="MudaSTTS2('${U}','${ID}','OK')">'OK ADM'</button>`:''}
                                       ${f?.n ?`<button onclick="MudaSTTS('${U}','${ID}','${f.n.s}')">${f.n.t}</button>`:'.'}`)(FLOW[Obj.Stts])}
                        </div>        
                    </div>

                </div>`
    }

    function Load_Perfil(U){
        const u = U.Nome
        
        const ADM = U.cgo=='Admn'

        const __S=[],__M=[],__a=[],__A=[],__D=[],__U=[]

        J['ARTE'].forEach(o=>{
            const isU = o.Dsng==u ; const S   = o.Stts
            if(isU)                                     __U.push(o) // Todos
            if(o.Dslk?.includes(u))                     __D.push(o) // Rejeitados
            else if((ADM || !o.Dsng || isU) && S=='_S') __S.push(o) // Solicitações
            else if((ADM || isU) && S=='Act')           __M.push(o) // Aceitos
            else if((ADM || isU) && S=='Ok')            __a.push(o) // OK1
            else if(isU && S=='OK')                     __A.push(o) // OK2
        })

        Inn($('#Perf-Perf'),`<img class="Pic" src="${U.Foto}">
                <div class="Desc Cl Start2 Gap"><div class="Ct Gap"><h2>${U.Nome}</h2><p>${D_Brev2[U.cgo]}</p></div>
                    ${['Emal','Lcal','Fone'].map(e=>`<div class="Ct gap"><a class="Svg-P f-Yell">${SVG[e]}</a><p>${U[e]}</p></div>`).join('')}
                </div>
                <div class="Ct" style="width:300px">${Tm_Tags(ListaTags(__U))}</div>
                <div class="Ct Gap">
                    <div class="Box2 HOV Cl" onclick="View('${u}','Okay')"><a class="Svg-G f-Yell">${SVG['Okay']}</a><p>Total de Artes    </p><h3 class="f-Yell">${__A.length         }</h3></div>
                    <div class="Box2 HOV Cl" onclick="View('${u}','Dslk')"><a class="Svg-G f-redd">${SVG['Dslk']}</a><p>Total de rejeições</p><h3 class="f-redd">${__D.length         }</h3></div>
                    <div class="Box2 HOV Cl" onclick="Sldo('${u}'       )"><a class="Svg-G f-gren">${SVG['Coin']}</a><p>Saldo Total       </p>${Tm_RS2(SOMA_Obj(__a,'Valr'))}</div>
                </div>`)

        Inn($('#Perf-Soli p.Conty'),`${__S.length} UND`) ; Inn($('#Perf-Soli .Art'),Tm_Resumo(__S,U))
        Inn($('#Perf-Andm p.Conty'),`${__M.length} UND`) ; Inn($('#Perf-Andm .Art'),Tm_Resumo(__M,U))
        Inn($('#Perf-Cncl p.Conty'),`${__a.length} UND`) ; Inn($('#Perf-Cncl .Art'),Tm_Resumo(__a,U))
        Inn($('#Perf-Hist p.Conty'),`${__A.length} UND`) ; Inn($('#Perf-Hist .Art'),Tm_Resumo(__A,U))
    }

    function Load_Page(div,Mod){
        const validUser=d=>d.Nome!='Login' && d.cgo!='Atnd'
        const isOk=s=>s=='Ok'||s=='OK'
        
        const mapArts = {} // Agrupa ARTE por designer (1 loop só)
        J['ARTE'].forEach(a=>{if(!isOk(a.Stts)) return;(mapArts[a.Dsng]??=[]).push(a)})

        const USERS = J['USER'].filter(validUser).map(d=>{
            const Arts = (mapArts[d.Nome]||[]).slice().reverse()
            const Tags = ListaTags(Arts)
            const Rank = MediaRank(Arts,Tags)
            return {...d,Arts,Tags,Rank}
        }).sort((a,b)=>b.Rank - a.Rank)

        Inn(div, USERS.map(u=>`
            <div class="Boxy CT w100">
                <div class="LA Ct h100 gap">
                    <div class="Start2">
                        <div class="Head Ct gap"><p>${u.Rank}° - ${u.Nome}</p><a class="St ${u.On?'On':'Of'}"></a></div>
                        <img class="Perf" src="./Img/Perfil_${u.Nome}.webp">
                        <div class="Cl Start2"><p>${u.Cgo}</p><button onclick="Ger_SOliArt('${u.Nome}')">Solicitar</button></div>
                    </div>
                    <div>
                        <p>Saldo Total</p>${Tm_RS2(SOMA_Obj(u.Arts,'Valr'))}
                        <p>${u.Arts.length} Artes</p>
                    </div>
                </div>
                <div class="LB h100 Cl Gap Start2">
                    <div class="CT w100 Gap Art">${Tm_Resumo(u.Arts,u,Mod)}</div>
                    ${Tm_Tags(u.Tags)}
                </div>
            </div>
        `).join(''))
    }

    function TrocaRasc(Eu,X){
        $$('.RASC img',Avo(Eu)).forEach(e=>Add_N(e))      ; Rmv_N($(`.RASC img:nth-child(${X})`,Avo(Eu)))
        $$('.F2'      ,Bzv(Eu)).forEach(e=>Add(e,'NONE')) ;   Rmv($(`.RasC${X}`,Bzv(Eu)),'NONE')
    }
</script>

    <script> // ==== INTERFACE ====

            Dest.onchange=()=>{const p=Preset[Dest.value];if(!p){Rmv_N($(Mdds));return;}const [w,h]=p.split(':').map(Number);Lag.value=w*10;Alt.value=h*10;Draw();};
            [Lag,Alt].forEach(i=>i.oninput=Draw);Draw()

            const clone = base.cloneNode(true)
            Clen_Alls(clone)

        const SELY=e=>{ // ===== SELECT ===== 
            DTV($$('.e')) ; ShowTrue($$('.topbar'),e) ; Add_N($$('.idTop')) ; if(!e){return}  // Desativa e Oculta e retorna caso n seja nada

        const adD=(Mod,x,y,S,Iner)=>{ // ===== ADD Canvas Fake =====
            const TOP = $(".topbar",Avo(S))
            const Idx = $$('.idTop',TOP).length+1
            const T   = $('.idTop',TOP).cloneNode(true)       ; Nm(T,Idx) ; Add(T,Mod=='Txt'?null:'Img') ; TOP.appendChild(T)
            const e   = NewTag('div') ; e.className=`${Mod=='Fnd'?'noClk':'e'} noDrg` ; Nm(e,Idx) ; e.style.cssText=`left:${x}px;top:${y}px` ; e.dataset.s=1;e.dataset.r=0
            const Cntu= e=>`<div class="EE noDrg"><div class="c noslt Ct gap">${e}</div><a class="sc"></a><a class="rt"></a></div>`
            if (Mod === 'Txt') {              Inn(e,Cntu(`${Iner}`))}
            if (Mod === 'Img') {InptImg(url=>{Inn(e,Cntu(`<img draggable="false" src="${url}" style="width:150px">`))})}
            if (Mod === 'Fnd') {InptImg(url=>{Inn(e,     `<img draggable="false" src="${url}" style="width:100%;height:100%" class="noClk">`)})}
            S.appendChild(e);SELY(e)
        }

        function ClickDuplo(Eu,e){ // ===== DUPLO CLICK FUNDO =====
            const [x,y]=[e.offsetX,e.offsetY] ; if (e.target!==Eu) return
            Eu.insertAdjacentHTML("beforeend",`<div class="menu Box Abslt Ct" style="left:${x}px;top:${y}px">
                <button onclick="adD('Txt',${x},${y},Avo(this),'Texto') ; Dlt(Pai(this))">+ Texto  </button>
                <button onclick="adD('Img',${x},${y},Avo(this))         ; Dlt(Pai(this))">+ Imagem </button>
                <button onclick="adD('Fnd',${x},${y},Avo(this))         ; Dlt(Pai(this))">Img Fundo</button>
            </div>`)
        }

            adD('Txt',0,0,$('.UNDD .s'),'Titulo')

            adD('Txt',0,0,$('.UNDD .s'),'Zap')
            adD('Txt',0,0,$('.UNDD .s'),'Endereço')
        }

        function Disppp(Eu,e){ // ===== MOUSE =====
            e.preventDefault()
            if(e.target==Eu)                           return SELY(null)
            const el = e.target.closest('.e');if (!el) return SELY(null) ; SELY(el)
            ZZ.ox=  e.clientX    ; ZZ.oy=  e.clientY
            ZZ.rs=+ el.dataset.s ; ZZ.rr=+ el.dataset.r
            ZZ.M =  Coten(e.target,'sc')?2:Coten(e.target,'rt')?3:1
        }

        document.addEventListener('click', e => {if (ZZ.dragged) {ZZ.dragged = false ; return } ; if (e.target.closest('.e') ||e.target.closest('.menu') ||e.target.closest('.topbar')) return;SELY(null);Add_N($$('.menu'))})
        document.addEventListener('keydown',e=>{if(e.target.tagName=='INPUT') return ; if(!ZZ.ED && e.key =='Delete'&&ZZ.A)ZZ.A.remove()}) // ===== DELETE =====
        document.onmouseup  =_=>{ZZ.M=0 ; ZZ.ox=ZZ.oy=ZZ.rs=ZZ.rr=null}
        document.onmousemove=e=>{
            const tf = () => ZZ.A && (ZZ.A.style.transform =`scale(${ZZ.A.dataset.s}) rotate(${ZZ.A.dataset.r}deg)`)
            if(!ZZ.A||!ZZ.M||ZZ.ED) return
            ZZ.dragged = true
            if(ZZ.M==1){ZZ.A.style.left=parseFloat(ZZ.A.style.left)+e.movementX+'px'
                        ZZ.A.style.top =parseFloat(ZZ.A.style.top )+e.movementY+'px'}
            if(ZZ.M==2){ZZ.A.dataset.s=Math.max(.1,ZZ.rs+(e.clientX-ZZ.ox)/200);tf()}
            if(ZZ.M==3){ZZ.A.dataset.r=ZZ.rr+(e.clientX-ZZ.ox);tf()}}
    </script>
