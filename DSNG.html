<script> // Página do Designer
    function TrocaFoto(Eu){const Drop = $('.Drop',Pai(Eu)) ; Tog_N(Pai(Drop)) ; Tog_N(Eu) ; PrepDrop2(Drop,1)} /*GAMBIARRA*/
    function RodarDrops() {$$('.INFO .Drop').forEach(e=>PrepDrop2(e,1))} /*GAMBIARRA*/
    const View=(__)=>MODAL(`<div class="Ct Mmdal">${Tm_Resumo(ARTS[__],USUARIO)}</div>`)
    const Sldo=(  )=>MODAL(`<div class="Ct Mmdal"><table><tbody>${Tm_Tr('MPAG',J['MPAG'])}</tbody></table></div>`)

    function TrocaRasc(Eu,X){ // tentar algo dinâmico aqui tbm
        $$('.RASC img',Avo(Eu)).forEach(e=>Add_N(e))      ;   Rmv_N($(`.RASC img:nth-child(${X})`,Avo(Eu)))
        $$('.F2'      ,Bzv(Eu)).forEach(e=>Add(e,'NONE')) ;     Rmv($(`.RasC${X}`,Bzv(Eu)),'NONE')
    }

    function Tm_Tags(Arr){
        const CorTag = {Gray:'#4b4b4b',Yelw:'#bb8c00',Roxo:'#C77DFF'}
        const Obj = ['Tema','Tipo'].map(k=>Uniq(Arr.map(e=>e[k]).filter(Boolean)))
        return `<div class="Tags Ct gap w100" style="overflow:hidden">${Obj.map((arr,i)=>arr.map(t=>`<p style="background:${CorTag[i? 'Yelw':'Gray']}">${t}</p>`).join('')).join('')}</div>`
    }

    function Tm_Resumo(E,U,Rclh){
        return `${E.map(e=>`
        <div class="Resumo gap Cl Bt Hov Box2 Rltv ${Rclh}" data-Cor="${e.Stts}" onclick="MODAL(Tm_Exib('${U.Nome}','${e.Id}',event,'${U.Crgo}'));RodarDrops()">
            ${e.Dsng ? `<img class="Pic Abslt" src="${Foto(e.Dsng)}">`:''}
            <p class="CropTxt Mw80">${e.Clnt}</p><img class="LILI" src="${BASE_URL}Img/${e.Img}?v=${Date.now()}">
            <p>${e.Tipo}</p><div class="Cl Start2 NN"><b>${e.Nome}</b><p>${e.Tema} • ${TempoResta(e.Prazo)}</p></div>
            <div class="NN">${Tm_RS2(e.Valr)}</div>
        </div>`).join("")}`
    }

    function Tm_Exib(U,ID,ev,cgo){ // Falta Melhorar?
        if (ev?.target.closest('button')) return
        const Admn = cgo=='Admn'
        const Obj  = J['ARTE'].find(e=>e.Id==ID)
        const ADM  = Col     =>Admn ? `data-r="ARTE-${Obj.Id}-${Col}-Edit-_-_" data-p="" contenteditable="true" onkeydown="EntBlr(this)" onblur="DTV(this);EditCell(this)" onfocus="ATV(this)"`:''
        const ADMs = Col     =>Admn ? `data-r="ARTE-${Obj.Id}-${Col}-Slct-_-_" data-p="" contenteditable="true" onkeydown="EntBlr(this)" onblur="DTV(this);EditCell(this)" onfocus="ATV(this)"`:''
        const ADMp = (id,Col)=>Admn ? `data-r="REGRA-${id}-${Col}-Edit-Bj-Sc" data-p="ARTE-${Obj.Id}-Regra-Edit-_-_"`:''
        const ADMP = (id,Col)=>Admn ? `data-r="REGRA-${id}-${Col}-Edit-Bj-Sc" data-p="ARTE-${Obj.Id}-Regra-Edit-_-_" contenteditable="true" onkeydown="EntBlr(this)" onblur="DTV(this);EditCell(this)" onfocus="ATV(this)"`:''
        const ADMt = (id,Col)=>Admn ? `data-r="REGRA-${id}-${Col}-Text-Bj-Sc" data-p="ARTE-${Obj.Id}-Regra-Edit-_-_" contenteditable="true"                          onblur="DTV(this);EditCell(this)" onfocus="ATV(this)"`:''

        const Rgr  = Obj.Regra
        const   G  = a=>`style="grid-area:${a}"`
        return `
        <div class="INFO">
            <h3 class="Ct" ${G('A')} ${ADM('Nome')}>${Obj.Nome}</h3>
            
            <div class="F1 Box2" ${G('B')}>
                <div ${G('A')} class="Bt"><div class="Ct">Tipo:<div>${Admn ? `<select ${ADMs('Tipo')}>${Tm_Opt(O['TArt'],Obj.Tipo)}</select>` : Obj.Tipo}</div></div><div>Arte Aberta</div><div ${ADM('Dsng')}>${Obj.Dsng}</div></div>
                <div ${G('B')} class="Box2 RASC"     >${For(Rgr.length).map(e=>`<img class="Rascunho ${e==0?'':'none'}"             src="${BASE_URL}Dsng/${Obj.Id}_Rasc_${e+1}.webp?v=${Date.now()}">`).join('')}</div>

<script> // ==== CALCULAR VALOR DA ARTE ====
    const Calc=()=>{
        const Tipo  = Vll($('#ART_Tipo'))
        const vBase = Tipo_ARTE.find(a=>a.Nome==Tipo)?.Valr ?? 0
        const Soma  = arr=>arr.reduce((s,e)=>s+(NoVazio(e)?+Nm(e):0),0)
        const UNDD  = $$('.Rasc_Und')
        const Pct1  = Soma($$('[data-Nv="1"]')) // % desconto Nv1
        const adUND = UNDD.map((u,x)=>{const Nv2 = $$('[data-Nv="2"]',u) ; const Pct = (Nv2.length * 3) - Soma(Nv2) ; return { Und:x, Pct }})
        const vUNDD = (vBase * (1 - Pct1/100)) * (1 + Math.max(UNDD.length - 1, 0) * 0.15)
        const Nv3   = $$('[data-Nv="3"]')
        const pNv3  = Nv3.length ? Nv3.filter(NoVazio).length / Nv3.length : 0
        const Desc  = pNv3 * 20
        return {vBase, Final:(vUNDD*(1-Desc/100)).toFixed(2)}
