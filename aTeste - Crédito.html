<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Parcelamento Mercado Pago</title>
  <link  href="https://cdn.jsdelivr.net/gh/InfinityGraff/MyBiblioteca@main/fontes.css"        rel="stylesheet">
  <link  href="https://cdn.jsdelivr.net/gh/InfinityGraff/MyBiblioteca@main/CSSBiblioteca.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/gh/InfinityGraff/MyBiblioteca@main/PreScript.js"      ></script>

  <link  href="./CssGRAFF.css" rel="stylesheet">
</head>
<body class="Infinity Dark">
  <div>
    <h1>Parcelamento Mercado Pago</h1>
    <div class="Ct">
      <input id="valor" type="number" placeholder="Valor em R$" oninput="simular()">
      <button onclick="simular()">Simular</button>
    </div>
    
    <table>
      <thead><tr><th>Parcelas</th><th>Taxa</th><th>Total (R$)</th><th>Parcela (R$)</th></tr></thead>
      <tbody id="res"></tbody>
    </table>
  </div>

<script>
  const TaxaMpag=[0,0.0964,0.1123,0.1136,0.1431,0.1432,0.1672,0.1673,0.1969,0.2065,0.2066,0.2066]
  function simular(){
    const v=+valor.value;if(!v)return alert("Digite um valor!")
    Inn(res,TaxaMpag.map((t,i)=>{const tot=v*(1+t),parc=tot/(i+1);return `<tr><td>${i+1}x</td><td>${(t*100).toFixed(2)}%</td><td>${tot.toFixed(2)}</td><td>${parc.toFixed(2)}</td></tr>`}).join(''))
  }
</script>

</body>
</html>
