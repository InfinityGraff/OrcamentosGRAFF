    const SUPABASE_URL      = "https://adxigvfxtafvlmpvwwvb.supabase.co"
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkeGlndmZ4dGFmdmxtcHZ3d3ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE1Njc1NTEsImV4cCI6MjA2NzE0MzU1MX0.wc90qDuSNhtolJBd4qLEux3xCwJwPuTTFb3gZMKUBYU"

<style>
    body{width: 100vw; height: 100vh;}
</style>

<body class="Infinity Dark CSS1 Ct">

    <div class="Ct Gap">

        <form id="signup-form" class="Cl Box1">
            <h2>Cadastrar</h2>
            <input type="email" id="EMAIL" placeholder="Email" required>
            <input id="PASS1" placeholder="Senha" required>
            <button type="submit">Criar Conta</button>
        </form>

        <form id="login-form" class="Cl Box1">
            <h2>Entrar</h2>
            <input type="email" id="LOGIN" placeholder="Email" required>
            <input id="PASS2" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>

        <form id="forgot-form" class="Cl Box1">
            <h2>Esqueci a senha</h2>
            <input type="email" id="EMAIL_RESET" placeholder="Seu email" required>
            <button type="submit">Enviar link</button>
        </form>

        <button id="LogOut">Sair</button>

        <div id="msg"></div>
    </div>
</body>

<script>
    const msg = $('#msg')

    $('#signup-form').addEventListener('submit', async e => {
      e.preventDefault()
      const email = Vll('#EMAIL') ; const password = Vll('#PASS1')
      const { error } = await supaBASE.auth.signUp({ email, password })
      msg.textContent = error ? error.message : 'Conta criada! Confirme seu email.'
    });

    $('#login-form').addEventListener('submit', async e => {
      e.preventDefault()
      const email = Vll('#LOGIN') ; const password = Vll('#PASS2')
      const { data, error } = await supaBASE.auth.signInWithPassword({ email, password })
      msg.textContent = error ? error.message : `Login bem-sucedido! Usuário: ${data.user.email}`
    })

    $('#forgot-form').addEventListener('submit', async e => {
        e.preventDefault()

        const email = Vll('#EMAIL_RESET')

        const { error } = await supaBASE.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/reset.html'
        })

        msg.textContent = error
            ? error.message
            : 'Link enviado! Verifique seu email.'
    })

    $('#LogOut').addEventListener('click',async ()=>{await supaBASE.auth.signOut() ; msg.textContent = 'Logout feito!'})
</script>


</html>
