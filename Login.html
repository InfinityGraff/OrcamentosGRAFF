<body class="Infinity Dark CSS1 Ct" style="width:100vw;height:100vh">

    <div class="Ct Gap">
        <form class="Cl Box1" onsubmit="Cadastrar(event,Vll($('.Email',this)),Vll($('.Senha',this)))">
            <h2>Cadastrar</h2>
            <input type="email"    placeholder="Email" class="Email" required>
            <input type="password" placeholder="Senha" class="Senha" required>
            <button type="submit">Criar Conta</button>
        </form>
        <form class="Cl Box1" onsubmit="Login(event,Vll($('.Email',this)),Vll($('.Senha',this)))">
            <h2>Entrar</h2>
            <input type="email"    placeholder="Email" class="Email" required>
            <input type="password" placeholder="Senha" class="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <form class="Cl Box1" onsubmit="ResetPass(event,Vll($('.Email',this)))">
            <h2>Esqueci a senha</h2>
            <input type="email" placeholder="Seu Email" class="Email" required>
            <button type="submit">Enviar link</button>
        </form>
        <button id="LogOut" onclick="LogOut()">Sair</button>
        <div id="msg"></div>
    </div>
</body>

<script>
    let USUARIIIO = []
    const msg = $('#msg')

    async function Cadastrar(e,email,password){e.preventDefault()
        const { error } = await supaBASE.auth.signUp({email,password})
        msg.textContent = error ? error.message : 'Conta criada! Confirme seu email.'
    }
    async function Login(e,email,password){e.preventDefault()
        const { data, error } = await supaBASE.auth.signInWithPassword({email,password})
        msg.textContent = error ? error.message : `Seja Bem-Vindo! ${data?.user?.email}`
    }
    async function ResetPass(e,email){e.preventDefault()
        const {error} = await supaBASE.auth.resetPasswordForEmail(email, {redirectTo:'https://www.infinitygraff.com.br/reset.html'})
        msg.textContent = error ? error.message : 'Link Enviado! Verifique seu email.'
    }
    async function LogOut(){await supaBASE.auth.signOut() ; msg.textContent = 'Perfil Desconectado!'}

    async function PuxarUser(){
        const { data:userData } = await supaBASE.auth.getUser()
        if(!userData.user)return
        const { data:User,error } = await supaBASE.from('USER2').select('*').eq('Id',userData.user.id).single()
        if(error)return console.log(error)
        USUARIIIO = User
        PosLogin()
    }

    function PosLogin(){
        LOG(USUARIIIO)
        //Load_Perf(USUARIIIO)   
    }

    PuxarUser()

</script>
