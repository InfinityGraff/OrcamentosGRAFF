<div>   <!--TABELAS  - ⭐⭐⭐ _ _ -->
    <script>// TABELAS (Transitar na Tabela com as Setas do Teclado)
        // Estão OK
        const Tm_Sklt  =(Typ)=>For(16).map(()=>`<tr>${For(10).map(()=>`<td><div class="Sklt"></div></td>`).join('')}</tr>`).join('') // Esqueleto
        const Tm_tdFoot=(arr,Typ)=>arr.map((e,x)=>`<td data-R="${Tm_R('Foot',x,Typ)}" class="Rltv"></td>`).join('')

        // Ajeitar
        const LoadBndj =(Eu,R)=>{if(Coten($('.BNdj',Pai(Eu)),'none')){Inn($('.BNdj > table',Pai(Eu)),Tm_Bndj(R,'','DOM'))}}
        function RenderSVVG(td){Inn($('span',td),Nm($('svg.P-P',td)))}//(GAMBIARRA) (Outras Formas de Exibir Bandeijas) isso talvez deva entrar em (BjIN)
        function CopyFone(Fone,Eu){LOG(Fone)}
        
        const ImgT_T=(col,e,R)=>{
            const ARTEE = col=='Serv' ? JJ['ARTE'][e.Arte.split('-')[1]]?.Img : ''
            return                col=='Serv' ? ARTEE  ? Tm_Tm['Imgs'](ARTEE,`SERV-${e.Id}-Arte-Imgs-Bj-Sc`) : ''
                                : col=='Arte' ? e.Img  ? Tm_Tm['Imgs'](e.Img,`SERV-${e.Id}-Arte-Imgs-Bj-Sc`) : ''
                                : col=='Clnt' ? e.Cntt ? `<img class="HOV" loading="lazy" onclick="CopyFone('${e.Cntt}',this)"  src="./CrudSB/Fone.webp">`:''
                                : ''
        // isso daqui tem que ser, Pegar todas as Imagens que estão dentro da Bandeija, todas mesmo incluindo Bandeija de Bandeija e Links tbm
    }

        const FazerTitle=(Typ,Find,Buttonn)=>{
            const Stg = BS[Typ].Title
            const Fn = Function('e',`return ${Stg}`)
            const Join = Find.map(e=>Fn(e)).join('|')
            return  Stg ? Join ? BrevTitle(Typ,Join) : Buttonn : 'Sem Titulo'
        }

        function Tm_Bndj(R,Arr,DOM){
            const r = d_r(R)                                   // Melhorar declarações
            const [Typ,col,Id,Tm]=[r.Ty,r.Cl,r.Id,r.Tm]        // Melhorar declarações (melhor usar _R.Ty e _R.Cl)
            const COL   = Tm=='Bndj' ? AA(col) : BS[Typ].Json[col].LINK.split('-')[0] // isso serve pra acessar qual é a Tabela Passiva
            if(Typ=='PGMT'&&col=='Clnt'){return}
            const dado  = Typ=='GRAD' ? J[Typ].find(j=>j.Id==Id)[col] : JJ[Typ][Id][col]
            LOG(dado)
            const Dados2=dado=>{if(COL=='UBER'){return []} ; if(!dado){return []} ; return `${dado}`.split(' | ').map(e=>{const E = e.split('-') ; if(!E[1]){return null} ; return JJ[E[0].trim()][E[1].trim()]})}

            const Find   = Tm=='Bndj' ? (dado||[]) : Tm=='Link' ? Dados2(dado) : []
            if(Tm=='Link'&&Find[0]==undefined){return}    // só ta aqui pq no Link GRAD quando chamo OS ta dando um ERRO pois um item é Undefined
            const Buttonn = Find.length==0 ? `<button class="Mini" onclick="">+ NOVO ${RmvPlural(D_Brev[COL])}</button>` : ''
            const Title  = FazerTitle(COL,Find,Buttonn)
            const SunPix = Stg=>Stg.split('|').map(p=>parseFloat(p.replace(/[^\d.,]/g,'').replace(',','.'))||0).reduce((sum,n)=>sum+n,0) // Ver se eu Consigo Eliminar isso!
            const NmTle  = col==='Pgmt'? SunPix(Title) : Title.includes('button') ? '' : Title // (GAMBIARRA preparar pra RMV)
            const Cimg   = Find.map(e=>ImgT_T(col,e,R)).join('')
            
            Find.map(e=>`${ALL[col]?.push(e[col])}`)

            const Bandeija=(arr,TYP,_P)=>`<thead><tr>${arr[0].map(t=>`<th>${t}</th>`).join('')}</tr></thead><tbody>${arr.slice(1).map((LL,X)=>`<tr class="tr-${LL[0]}-${X}">${LL.map((v,x)=>Tm_Td(v,LL,x,TYP,_P)).join('')}</tr>`).join('')}</tbody>`
            if(DOM){return `${Find.map((e,x)=>x===0 ? Bandeija(ArrObj_OrdnCol(Find,BS[COL].Orden),COL,R):'').join('')}`} // isso Roda a Situação dentro da Table
            else{return `<div class="Ct" onclick="LoadBndj(this,'${R}');ShowBndj(Pai(this),'${Typ}')">
                    <p data-R="${R}" class="P-P T-T Ct PT" name="${NmTle}">${Title}</p>${Cimg}<i class="grifoo PT RD" onclick="Tog_N($('i',this))"><i class="GrifColr"></i></i></div>
                    <div class="Rltv w100"><div class="BndjTBL BNdj Abslt none Cl"><a>${SVG.Ponta}</a>
                        <table class="Bdj_${COL} ${COL=='RG'?'':NoVazi(Find[0]?.Id)?'':'none'}"></table>
                        ${Tm=='Bndj'?`<button class="Mini" onclick="AddRowBdj(this,'${R}')">+ Novo ${RmvPlural(D_Brev[COL])}</button>`:
                            Tm=='Link'?`<button class="Mini" onclick="RmvLink('${R}','${col}')">Excluir ${ col }</button><button class="Mini" onclick="Tog_N($('.TrcLINK',Pai(this)))">Trocar ${ col }</button><div class="TrcLINK none">${Tm_Tm['Link2']('',R,'')}</div>`:''}
                    </div>
                </div>`
            }
        }

        function TogTbody(e){Tog(e.closest('tbody'),'closed')}
        const HeadGroupTR = `<tr class="H_Tbody" onclick="TogTbody(this)"><td></td><td colspan="3">📦 Grupo</td></tr>` // aqui terá um Breve Resumo do Mês Inteiro

        function loadtmtable(Typ,GAMBIARRRRRRRRRA,Lmtt){ // ISSO é o VERDADEIRO tm_Table o outro lá é um Tm_Trs
            const LOAD=(TYP)=>{
                Add_N($(`#H_${TYP}`)) // Oculta a Table Original pra poder ver o Esqueleto
                setTimeout(()=>{
                    const NewTyp = RANGE_DATA(J[TYP],BS[TYP].Limit,Lmtt) // Limita por Data
                    if(TYP=='PDDS'){Inn($(`#H_${TYP} > .Bodd1`), HeadGroupTR  + Tm_Table(TYP, !GAMBIARRRRRRRRRA ? NewTyp.reverse() : NewTyp)) /*TBODYID*/
                                }else{Inn($(`#H_${TYP} > tbody`), Tm_Table(TYP, !GAMBIARRRRRRRRRA ? NewTyp.reverse() : NewTyp))} /*TBODYID*/
                    Inn($(`#H_${TYP} > thead`),`<tr>${Tm_thSort(BS[TYP].Orden,TYP)}</tr>`)
                    Inn($(`#H_${TYP} > tfoot`),`<tr>${Tm_tdFoot(BS[TYP].Orden,TYP)}</tr>`)
                    RFresh(TYP,'All')
                    Rmv_N($(`#H_${TYP}`)) // Exibir a table Original
                    if($(`#SKLT_${TYP}`)){Add_N($(`#SKLT_${TYP}`))} // Ocultar o Esqueleto
            },0)}

            if(ObjKey(J).includes(Typ)){
                if(PreTbl[Typ]==true&&!GAMBIARRRRRRRRRA){MyAlert(Mnsg['PreTbl'](D_Brev[Typ]));return} // Conferir se essa Aba já foi Aberta!
                        if(Typ=='PDDS'){LOAD(Typ);LOAD('SERV');LOAD('PGMT')             } // tem 3 Tabelas na #PagPDDS
                else if(Typ=='PGMT'){LOAD('MPAG')                                    } // tem 2 Tabelas na #PagPGMT
                else if(Typ=='GRAD'){LOAD(Typ);LOAD('OS');LOAD('UBER'),LOAD('GRD2')  } // tem 3 Tabelas na #PagGRAD
                else{LOAD(Typ)}                                                        // os demais tem só 1 tabela
                PreTbl[Typ]=true                                                     // Declarar que a Aba já foi Aberta!
            }
        }
        function Tm_Table(Typ,arry,Rpai=''){
            const IN = performance.now()
            const Retorno = arry.map(e=> e ? `<tr class="tr-${e[Pry[Typ]]}">${ObjOrdn(e,BS[Typ].Orden).map((v,x)=>Tm_Td(v,e,x,Typ,Rpai)).join('')}</tr>` : '').join('')
            LOG(`⏱️🔴 Tm_table(${Typ}): ${MS(IN)}`)
            return Retorno
        }

        // 🚫 impedir que cliente seja excluido quando ele tiver atribuido a pelomenos 1 Pedido
        // 💡 Opção de mais de 1 Designer
        // 💡 Mover-se nas células com as Setas
    </script>

<div>   <!--PESQUISA - ⭐⭐⭐⭐ _  (⚡ sem DOM ⚡) (🎨 Apenas Melhorar a Interface) (⚠️ botar os Grifos na Bibliotecas pra tbm ser usado no Select)-->
    <script> // SCRIPT - PESQUISA
        let debounceTimer
        const Espelhar =(Org,Dst)=>{Dst.forEach(e=>{e.innerHTML = Org.innerHTML ; $('input',e) ? $('input',e).value = $('input',Org).value : null})}
        const Acnto    =(s,Tru)=>Tru && s ? `${s}`.normalize("NFD").replace(/[\u0300-\u036f]/g,"") : s
        
        // LINKS
        const Griff =(e,Rgx)=>`${e}`.replace(Rgx,e=>`<b style="background:#8f007c; color:white">${e}</b>`)          

        const GrifarAcc=(e,val,Rx,C)=>{ // Provavelmente da pra passar o SELECT pra aqui pra dentro!
            const t  = val ; const tn = C ? t.normalize("NFD").replace(/[\u0300-\u036f]/g,"") : t
            const m  = tn.match(Rx) ; if (!m) return ; const i = m.index
            if(TagVoid.has(e.tagName)){Add(e,'Psq')}
            else{Inn(e,t.slice(0,i)+`<strong style="background:orange">${t.slice(i,i+m[0].length)}</strong>`+t.slice(i+m[0].length))}
            // Mudar este Background para uma Class="Griff"
        }

        const LimpaGrifo=tr=>{
            const RmvGrifo=e=>{Inn(e,Inn(e).replace(/<strong[^>]*>(.*?)<\/strong>/gi,"$1")) ; Rmv(e,'Psq')}
            $$('.P-P',tr).forEach(p=>RmvGrifo(p))
            $$('.GrifNot1',tr).forEach(e=>{Rmv(e,'GrifNot1')})              // 2° - Limpa todos os "grifNot" (é a Bolinha)
        }
        
        const Load_Pesq=Typ=>
            `<div class="pPesq Pesq_${Typ} Rltv" class="none">
                <input class="w100" placeholder="Pesquisar em ${D_Brev[Typ]}..." oninput="Pesq(this,'${Typ}')">
                <i class="Abslt" onclick="Tog_N($('span',Pai(this)))">▼</i>
                ${['Aa','A_','Bj','Rx','_C'].map(e=>`<a class="Abslt HOV Pesq-${e}" onclick="TOV(this);Pesq($('input',Pai(this)),'${Typ}')">${e}</a>`).join('')}
                <img id="Lupa" class="Abslt HOV" src="./SVG/Icon_Lupa.svg">
                <span class="BndjPsq BNdj Abslt Ct none">
                    <select class="COL1" onload="Inn(this,Tm_Opt(['','','Clnt','Serv','Pgmt']))"></select>
                    <select class="COL2" onload="Inn(this,Tm_Opt(['','','Grad','Desc','Cmnt']))"></select>
                    <div onload="Tm_Check(this,'${SVG.Chek.replace(/"/g,'&quot;')}','Mais de uma Correspondência')"></div>
                    <div onload="Tm_Check(this,'${SVG.Chek.replace(/"/g,'&quot;')}','Aceitar Erros Ortográficos' )"></div>
                </span>
            </div>`

        function Avnc_Pesq(Ipt,Typ){ // isso faz o Regex de Pesquisa (Deve ter um Nome Melhor)
            const I = Ipt.value.trim().replace(/\s+/g,' ')                    // Limpar exesso de Espaços
            const Aa=$(`.Pesq_${Typ} .Pesq-Aa.Atv`)?  '' :'i'                 // Maiusculo e Minusculo
            const A_=$(`.Pesq_${Typ} .Pesq-A_.Atv`)?'\\b':''                  // Fronteiras de Palavras
            const Bj=$(`.Pesq_${Typ} .Pesq-Bj.Atv`)                           // Pesquisa Internas
            const rx=$(`.Pesq_${Typ} .Pesq-Rx.Atv`)                           // Pesquisa por Regex
            const _C=$(`.Pesq_${Typ} .Pesq-_C.Atv`)?false:true                // Acentuação
            const RX = new RegExp(`${A_}${rx?I:EscpRgx(Acnto(I,_C))}${A_}`,Aa)
            return [I,_C,RX]
        }
        
        const Grifar_Not=(tr,Typ,Val)=>{   // Tentar Fundir com de Cima!
            const td = _td($(Rx7(Typ,Val[0]),tr))
            Add(td,'GrifNot1')             // Dizer que a Div agora Possúi GrifNot do Tipo 1
            Inn($('.grifoo i',td),Val[2])  // Atribuir o Valor pra dentro do GrifNot                                     
        }

        function Ex_Pesq_J(Arr,Typ,RX,_C,Ipt){
            // Criar aqui as Condições que retorna um Erro, criado por mim mesmo, que vai dizer como os Argumentos tem que chegar aqui
            // se todos tiverem Ok, então segue, se não, meu Erro entra em Ação
            // Evoluir este Regex pra Aceitar Dados Literarios
            const [C1,C2] = [Vll($('.COL1',Pai(Ipt))),Vll($('.COL2',Pai(Ipt)))]

            const PesqJJ=j=>{
                try{const has=v=>v&&RX.test(Acnto(v,_C)+""),ent=o=>ObjEtr(o).find(([k,v])=>has(v)),arr=a=>a&&a.map(ent).find(Boolean)
                if(Typ!='PDDS'){const r = ObjEtr(j).find(([k, v]) => !isArr(v) && has(v));if (r) return [r[0], r[1]]}
                if (C1) {const v1 = j[C1] ; if(r=arr(v1)) return[C1,r[0],r[1]]} else {;const r1 = ObjEtr(j).find(([k,v])=>isArr(v) && arr(v));if(r1){const r2=arr(r1[1]);return[r1[0],r2[0],r2[1]]}}   // MODO 4 - Pesquisa interna sempre ativa
                    const v1 = j[C1] ; if (C1&&C2 && isArr(v1)) {const o2=v1.find(o=>o&&has(o[C2]));if(o2) return [C1,C2,o2[C2]]}                                                                      // MODO 3 - Pesquisa em duas camadas (C1+C2)
                return false}catch{return false}
            }
            const PesqJJ2 = j => {try{const has=v=>v&&RX.test(Acnto(v,_C)+"")
                    for (const [k, v] of ObjEtr(j)) {if (has(v)) return true /*[k, v]*/}
                    return false
                } catch { return false}
            }
            const PesqLink=j=>{
                if(Typ!=='PDDS'){return false}
                const TMs = ObjEtr(BS[Typ].Json).filter(([k,e])=>e.TM=='Link').map(e=>e[0])
                const Filtrado = TMs.map((col,x)=>{
                    if(!j[col] || j[col].length==0){return false} // só pra tirar caso de erro no j[col] pra o caso de ele vir como vazio ou [] (e isso nem precisa quando é pra PDDS)
                    const [TYP,ID] = j[col].split('-')
                    if(!TYP||!ID){return false}
                    return PesqJJ2(JJ[TYP][ID])
                })
                return Filtrado.some(e=>e==true)
            }
            const Dados = Arr.map(j=>PesqJJ(j))
            const OBJJJ = Arr.filter(j=>PesqJJ(j)||PesqLink(j))
            //LOG('xat',OBJJJ)
            return [OBJJJ,Dados[0]]
        }

        function Ex_Pesq(TRS,Typ,RX,_C,Ipt){
            let acc = []
            //const [C1,C2] = [Vll($('.COL1',Pai(Ipt))),Vll($('.COL2',Pai(Ipt)))]
            TRS.forEach(tr=>{                                                       // Rodar isso pra cada Tr
                let trOK   = false ; LimpaGrifo(tr)                                 // Define que começa Falso, ou seja Oculto e Limpar os Grifos
                const oObj = JJ[Typ][tr_ID(tr)]                                     // 1° - Encontra o Objeto pelo Tr
                const bjj  = Ex_Pesq_J([oObj],Typ,RX,_C,Ipt)                        // 2° - Faz o Match e Retorna o Caminho
                if(bjj[0].length!=0){trOK=true}                                     // se não for vazio, Passou no regex
                $$(`.P-P`,tr).forEach(p=>{GrifarAcc(p,Nm(p),RX,_C)})                // percorre Todos P-P da Camada1, Grifar cada P-P
                if(Ipt.value!=''&&bjj[1]){Grifar_Not(tr,Typ,bjj[1]) ; trOK=true}    // 3° - Se algum Bater faz o grifNot apartir do Caminho de bjj
                if(trOK){Rmv(tr,'n0') ; acc.push(tr_ID(tr))}else{Add(tr,'n0')}      // 4° - trOK define se Exibir ou Ocultar, e dar um Push no ID, pra retornar todos Id depois do Loop
            })
            return acc
        }

        function Pesq(Ipt,Typ){ /*ao apagar todo o texto os icons SOME, */
            clearTimeout(debounceTimer) // Cancela Chamadas Anteriores ao escrever mt Rápido
            debounceTimer = setTimeout(()=>{
                Espelhar(Pai(Ipt),$$(`.Pesq_${Typ}`).filter(e=>e!==Pai(Ipt)))
                const [I,_C,RX] = Avnc_Pesq(Ipt,Typ)

                if(Typ=='ORC'){ // Página é Orçamento
                    $$('#Div-Prod > div').forEach(e=>{
                        $$(".rgx",e).forEach(div=>GrifarAcc(div,div.textContent,RX,_C))    // grifar  as Ocorrências
                        AddTrue(e,'NONE',!RX.test(Acnto(e.textContent,_C)))                // Ocultar as Ausentes
                    })
                }
                else if(Coten($(`#Pag_${Typ}`),'TBLAA')){ // Página é uma Tabela
                    const ListPes = Ex_Pesq(TRs2(Typ,'1')     ,Typ,RX,_C,Ipt)    // Pesquisa tabela carregada, apenas Ocultando
                    if(Typ=='PDDS'){ // isso serve pra fazer a Pesquiza de coisas antigas, criando nova tabela!
                        const PesqJ   = Ex_Pesq_J(J[Typ].reverse(),Typ,RX,_C,Ipt)[0] // Pesquisa quando não existe nada na tabela, Criando com Template

        ObjKey(obj).forEach(k=>df[k]=obj[k]) // Atribuindo oq vem no Objeto dos argumento!
        /*Obj*/ DarJJ('Add',Typ,df.Id,null,df)
        /*Sub*/ if(!SB){Sb_CREATE(supaBASE,Typ,CleanObj(df))}
        /*DOM*/ PrePos($(`#H_${Typ} > tbody`),Tm_Table(Typ,[df]),Ps)
        if(SB){LOG('Linha Adicionada pelo SB')}

        /*OBJ*/     DarJJ('Del',R.Ty,R.Id)

        /*SUB*/     if(!SB){Sb_DELETE(supaBASE,R.Ty,R.Id)}
        /*SUB-IMG*/ if(!SB){Img.forEach(e=>Sb_DELIMG(supaBASE,e))}
        /*DOM*/     $$(Rx7(`${R.Ty}-${R.Id}-${R.Cl}`)).forEach(td=>{__tr(td).remove() ; if(SB){LOG('Deletado pelo SupaBase')}})
    }
    function MesclaRow(Typ,bs){          // ⭐⭐⭐⭐_   isso vai pra o SQL
        const SEL = $$(`#H_${Typ} tbody .SEL`) // pega todas as Células Selecionadas
        const Fim = SEL.at(-1)                 // pega Ultimo Item do Array
        const _Rf = d_r(Fim)                   // pega o _R do Ultimo
        let    Jn = ObjValToArr(ClnObjs(JJ[Typ][_Rf.Id],bs)) // criar o Def
        SEL.forEach(p=>{                       // pra cada Célula
            const _R = d_r(p)                  // pega o _R de cada um
            if(p!==Fim){                                                           // se for Diferente da Ultima
                const Ids_PDDS = ContCLNT[_R.Id]?.List||[]                         // Pega a Lista de Pedidos
                Ids_PDDS.forEach(ID=>{Sb_EDIT(supaBASE,'PDDS',ID,Aa(Typ),_Rf.Id)}) // Editar PDDS
                ObjEtr(ClnObjs(JJ[Typ][_R.Id],bs)).forEach(([k,v])=>Jn[k].push(v)) // Concatena as Informações
                RmvROW(p)                                                          // remove a Linha
            }else{ObjEtr(Jn).forEach(([k,v])=>{Sb_EDIT(supaBASE,'CLNT',_Rf.Id,k,UniqSplit(v).join(' || '))})} // Editar o Ultimo
        })
    }

    function EditCell(e,Mod,vall=null,Auto,SB){ // ⭐⭐⭐⭐⭐✔️ (Muito Boa!) // e:Celula | Mod:'Edit/Add,Del' |  Val: Valor | Auto: veio Automatica | SB: tem SupaBase       
        const V = is_ArrStg(vall) ?? (vall === "" ? "" : (vall || VAL(e))) // pega valor se for vazio ou string, ou array de String

        if(V==Nm(e)/* || Nm(e)=='False'*/){return} // não foi Aterado || é uma img (esse False precisa sair, Pois se for uma imagem deve receber aqui seu SRC)    

        const R  = d_r(e) ; let _R = R ? [R.Ty,R.Id,R.Cl,V]:null ; //LOG(Nyme[R.Bj][R.Sc])
        const P  = d_p(e) ; let _P = P ? [P.Ty,P.Id,P.Cl  ]:null

        const tR = Text ? '' : _tr(Pai(_tr(e))) // GAMBIARRA por causa do Textarea que usa MODAL pra escrever o texto dai não tem mais tr

        const ObjSec = P ? JJ[P.Ty][P.Id][P.Cl] : null // Dar o Objeto (Principal ou Bndj) se For Secundário adiciona o _P do Pai e depois Colata ele em 'ObjSec'            
        /*SUB*/ SB==null ? Sb_EDIT(...(R.Sc?[..._P,ObjSec]:_R)) : LOG('sem SB')
        /*DOM*/ $$(Rx7(..._R.slice(0,-1))).forEach(PP=>{
            const tr  = _tr(PP)
            const TD  = _td(Pai(PP))
            const T_T = TD && $('.T-T',TD)
            /*Del*/ if(Mod =='Del'){

                if(R.Bj && T_T && P && !Auto){InM(T_T,FazerTitle(P.Cl,ObjSec)) ; Text ? null : RFresh(P.Ty,tR,Auto,e)} // GAMBIARRA do textarea

                if(!Auto){if(R.Bj && T_T){
                        if(R.Sc){InM(T_T,FazerTitle(P.Cl,ObjSec)) ; Text ? null :  RFresh(P.Ty,tR,Auto,e)} // GAMBIARRA do textarea
                    }else{RFresh(R.Ty,tr,Auto,e)}
                }
            }
        })
    }

<script> // Biblioteca

    function CrypPass(senha){ // OBSOLETA
    const Cryp = senha.split('').map((c,idx)=>{
        if(/[0-9]/.test(c)){let N=parseInt(c)
        N=N===9?0:N+(idx%2===1?4:1);return N.toString()}
        else if(/[A-Za-z]/.test(c)){
        let L=c.charCodeAt(0)+(idx%2===1?5:1)
        if(L>90&&L<97)L-=26
        else if(L>122)L-=26
        return String.fromCharCode(L)}else{return c}})
    var par = [] ; var imp = []
    Cryp.forEach((e,idx)=>{idx%2===0?par.push(e):imp.push(e)})
    const Par=par.reverse().flatMap(C=>[`3${C}$`,`r${C}-`,`3${C}&`])
    const Imp=imp.reverse().flatMap(C=>[`-${C}e`,`V${C}9`,`@${C}K`])
    return Par.concat(Imp).join('')
    }

</script>
