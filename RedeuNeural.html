<!DOCTYPE html>
<html lang=pt-br>
<meta charset=utf-8>
<style>
    *{margin:0;font:12px arial}
    body{display:flex;background:#ddd}
    canvas{background:#fff;border-right:1px solid #999}
    #p{width:260px;height:100vh;overflow:auto;padding:5px;background:#eee}
    button{width:100%;margin-bottom:5px}
</style>

<canvas id=c width=900 height=250></canvas>

<div id=p>
    <button onclick="play=!play">Play / Pause</button>
    <button onclick="Clonar()">Clonar Pesos</button>
    Mutação
    <input id=mut type=number step=.01 value=.15 style=width:60px>
    <textarea id=txt style="width:100%;height:80px"></textarea>
    <div id=info></div>
</div>

<script>
    let melhor=null
    const X=c.getContext("2d")
    let play=1,v=6,ger=1
    const obs=[]
    setInterval(()=>obs.push({x:900,h:30,w:20}),1500)
    const ind=[]
    for(let i=0;i<20;i++){ind.push({x:60,y:180,vy:0,vivo:1,score:0,cor:`hsl(${i*18} 100% 50%)`,pesos:Array.from({length:6},()=>Math.random()*2-1)})}

    function IA(a){
        if(!obs.length||!a.vivo)return
        let o=obs[0]
        let e=[(o.x-a.x)/900,o.w/50,o.h/50,a.vy==0,v/10]
        let s=a.pesos[5]
        for(let i=0;i<5;i++){s+=e[i]*a.pesos[i]}
        if(s>.5&&a.vy==0){a.vy=-12}
    }

    function Col(a,o){return a.x+20>o.x && a.x<o.x+o.w && a.y+20>200-o.h && a.y<200}

    function loop(){
        if(play){
            v+=0.0005
            obs.forEach(o=>o.x-=v)
            if(obs[0]&&obs[0].x+obs[0].w<0){
                obs.shift()
                ind.forEach(i=>i.vivo&&i.score++)
            }
            ind.forEach(a=>{
                if(!a.vivo)return
                a.score+=0.02
                IA(a)
                a.vy+=.6 ; a.y+=a.vy
                if(a.y>180){a.y=180 ; a.vy=0}
                obs.forEach(o=>{if(Col(a,o))a.vivo=0})
            })
            if(!ind.some(i=>i.vivo)){Nova()}
        }
        X.clearRect(0,0,900,250)
        X.beginPath()
        X.moveTo(0,200)
        X.lineTo(900,200)
        X.stroke()
        X.fillStyle="#000"
        X.fillText("Geração: "+ger,10,15)
        X.fillText("Vivos: "+ind.filter(i=>i.vivo).length,10,30)
        obs.forEach(o=>X.fillRect(o.x,200-o.h,o.w,o.h))
        ind.forEach(a=>{
            if(!a.vivo)return
            X.fillStyle=a.cor
            X.fillRect(a.x,a.y,20,20)
        })
        info.innerHTML="<b>Geração "+ger+"</b><br>"+"<b>Melhor:</b> "+(melhor?melhor.score:0)+"<hr>"+
        [...ind].sort((a,b)=>b.score-a.score).map((a,i)=>
        `${i+1}
        <span style=color:${a.cor}>██</span>
        ${a.score}<br>
        ${a.pesos.map(v=>v.toFixed(2)).join(",")}<hr>`).join("")
        requestAnimationFrame(loop)
    }

    function Nova(){
        ger++
        let m=ind.reduce((a,b)=>a.score>b.score?a:b)
        if(!melhor||m.score>melhor.score)melhor={score:m.score,pesos:[...m.pesos]}
        txt.value=melhor.pesos.map(v=>v.toFixed(3)).join(",")
        let p=[...melhor.pesos]
        obs.length=0
        ind.sort((a,b)=>b.score-a.score).forEach((a,i)=>{a.x=60;a.y=180;a.vy=0;a.vivo=1;a.score=0
            let m=+mut.value
            a.pesos=i ? p.map(v=>Math.max(-2,Math.min(2,v+(Math.random()-.5)*m))) : [...p]
        })
        v=6+ger*0.1
    }

    function Clonar(){
        let p=txt.value.split(",").map(Number)
        if(p.length!=6)return
        melhor={score:0,pesos:p}
        Nova()
    }

    loop()

</script>
</html>
