<script>
    const Lista = $('#Lista')

    function Rodar(){
        const t= txt.value.trim()
        const w=Num(lar.value)||30
        const h=Num(alt.value)||3
        RenderizaFont(Lista,h,w,t,cor)
        
          Trc($('.hHeader'),'Modo2','Modo1')
          Add($$('.Nomd2'),'NONE')
          Rmv($$('.Nomd1'),'NONE')
          ATV($$('.Step'))
          Trc($('#S2'),'Ct','Cl')
          Add($('.bg'),'none')
    }

    function Escolher_Font(Eu,f,h,w,t,c,Id){
        LOG('Escolhendo')
        if(Modo=='Rank'){
            //Sb_EDIT(supaBASE,'FONT',Id,'Rcrt',false)
        }else if(Modo.value=='Remove'){
            Sb_EDIT(supaBASE,'FONT',Id,'Rcrt',false)
            Eu.remove()
        }else if(Modo.value=='Ver'){
            const Info = [f,h,w,t,c].map(e=>`<p class="info">${e}</p>`).join('')
            MODAL(`<div class="Cl">${Eu.outerHTML}<div class="Start2">${Info}</div><button onclick="Confirm_Font('${f}','${h}','${w}','${t}','${c}')">Confirmar</button></div>`)
        }else{
            LOG('Nada Acontece')
        }
    }

    function Confirm_Font(f,h,w,t,c){
        navigator.clipboard.writeText([t,w*100,h*100,c,f].join(','))
        LOG(t,w,h,c,f)
    }

    function Init(){
        const p = new URLSearchParams(location.search)

        if(p.get('t')) txt.value = p.get('t')
        if(p.get('h')) alt.value = p.get('h')
        if(p.get('w')) lar.value = p.get('w')
        if(p.get('c')) cor = p.get('c')

        if(txt.value) Rodar()
    }

    function GerarLink(){
        const t=txt.value.trim()
        const w=lar.value||30
        const h=alt.value||3
        const c=cor||'#000'
        const url=`${location.origin+location.pathname}?t=${encodeURIComponent(t)}&h=${h}&w=${w}&c=${encodeURIComponent(c)}`
        navigator.clipboard.writeText(url)
        alert("Link copiado!")
    }

    function RenderizaFont(Div,h,w,t,c){
        Inn(Div,"") ; if(!t) return
        const Size = window.innerWidth <= 500 ? 300 : 700
        const newL = Size
        const NewA = (h / w) * newL
        let i = 0
        const KitFontss = J['FONT'].filter(e=>e.Rcrt)
        function RenderNext(){
            const f = KitFontss[i].Nome
            const IDD = KitFontss[i].Id
            const id = "fit" + Math.random().toString(36).slice(2)
            Div.insertAdjacentHTML("beforeend",`<div class="Font-Itn Cl" onclick="Escolher_Font(this,'${f}','${h}','${w}','${t}','${c}','${IDD}')"><p>${f}</p><a style="width:${newL}px;height:${NewA}px"><p id="${id}" style="font-family:${f}">${t}</p></a></div>`)
            const el = $('#'+id)
            el.style.fontSize = "100px"
            el.style.color = c
            el.style.transform = ""
            const bw = el.offsetWidth      ; const bh = el.offsetHeight
            const sx = bw ? (newL/bw) : 1  ; const sy = bh ? (NewA/bh) : 1
            el.style.transform = `translate(-50%,-50%) scale(${sx},${sy})`
            i++ ; if(i < KitFontss.length){requestAnimationFrame(RenderNext)}
        }RenderNext()
    }

    const getSBPromise = SB_Get(supaBASE,['FONT'])

    function PosGET(){
        Onloads('body')
        Init()
    }


</script>
