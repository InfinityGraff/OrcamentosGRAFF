    function normalizeObj(obj,Colet={}){
        for (const k in obj) {
            let v = obj[k] ?? ""
            if (isJSON(v)) {try { v = JSON.parse(v) } catch {}}

            obj[k] = v
        };return obj

<script> // ----- GRIFO -----
    const RmvGrifo=e=>{Inn(e,Inn(e).replace(/<strong[^>]*>(.*?)<\/strong>/gi,"$1")) ; Rmv(e,'Psq')}
    const GrifarAcc=(e,t,Rx)=>{
        const m  = t.match(Rx) ; if (!m) return ; const i = m.index
        if(TagVoid.has(e.tagName)){Add(e,'Psq')} // se for Select
        else{Inn(e,t.slice(0,i)+`<strong>${t.slice(i,i+m[0].length)}</strong>`+t.slice(i+m[0].length))} // se for Texto
    }
    const Grifar_Not=(tr,Typ,Val)=>{   // Tentar Fundir com de Cima!

        Inn($('.grifoo i',td),Val[2])  // Atribuir o Valor pra dentro do GrifNot                                     
    }
    function FazeroGrif(Typ,RX,Aa){
        const Rgx = new RegExp(RX,Aa=='match'?'':'i')
        TRs2(Typ,'1').forEach(tr=>{ // Fazer o Griff
            $$('.GrifNot1',tr).forEach(e=>{Rmv(e,'GrifNot1')})  // Limpar GrifNot
            $$('.P-P',tr).forEach(p=>RmvGrifo(p))               // Limpar Griff
            $$(`.P-P`,tr).forEach(p=>{GrifarAcc(p,Nm(p),Rgx)})  // percorre Todos P-P da Camada1, Grifar cada P-P
        })
    }
</script>

<script> // ---- PESQUISA ----
    function Pesc_RX(Typ){
        const I =   $(`.Pesq_${Typ} input`).value.trim().replace(/\s+/g,' ')
        const s =x=>$(`.Pesq_${Typ} .Pesq-${x}.Atv`)
        const Bj=s('Bj') ? true  : false   // Internas
        const Aa=s('Aa') ?'match':'imatch' // Maiusculo
        const _C=s('_C') ? Acnto2(I) : I   // Acento
        const A_=s('A_') ? '\\b' :''       // Fronteiras
        const In=s('In') ? '^'   : ''      // começa com
        const Ot=s('Ot') ? '$'   : ''      // termina com
        const Of=s('Of') ? '^$'  : ''      // Vazio
        const T= true ? _C : EscpRgx(_C)
        const RX=Of||`${In}${A_}${T}${A_}${Ot}`
        return [RX,Aa,Bj]
    }

    function F_Rndn(Typ,col){      // ✔️ Randomiza   parece q tbm n tem xDOM
        const noCopy       = true // impedir que pinte quando não tem cópias
        const PermitOculta = true // opção pra ocultar quem n tem Randon
        const QRY   = `#H_${Typ} > tbody > tr > ${COLLLL(Typ,col)} > div > .P-P`
        const ObbjClnt=()=>$$(QRY).map(e=>Inn(e))
        let NewObj = {}
        const QntCores = Uniq(ObbjClnt()).length
        const CoresEtr = ObjEtr(cRepet(ObbjClnt())).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
                    if(noCopy&&v===1   ){} // não faz nada caso seja apenas 1 ocorrência
            else if(!k||k.trim()==''){} // n faz nada caso seja vazio
            else{if(true){NewObj[k]=RandoCor()}  // cor Randon
                    else{NewObj[k]=v}}               // do maior pra o menor
        })
        $$(QRY).forEach(e=>{Bkg(_tr(e),NewObj[Inn(e)])
            if(PermitOculta && NewObj[Inn(e)]==undefined){Add(_tr(e),'none')} // tentar mudar pra UndfNull(NewObj[Inn(e)]) // pra usar a biblioteca
        })
        // pra melhorar o Randomize

        // e quando eu quser Pintar apenas o Td
    }
    
    function F_Clen(Typ){                    // ✔️ Limpa todos os Filtros
        TRs(Typ).forEach(e=>{For(20).forEach(E=>Rmv(e,`n${E}`)) ; Bkg(e,'')}) // Exibe todas as Linhas e Limpa o Random

        Class.forEach(e=>{$$(`.${e}`).forEach(E=>{Rmv(E,e)})})
    }

    function Orden(e,ev,x,order=null){       // ✔️
        const AllI    =(table,Atv=null)=>$$(`:scope > thead > tr > th ${Atv=='Atv'?'i.Atv':'i'}`,table)
        function TogSeta(e,asc){AllI(_table(e)).forEach(i=>{DTV(i);i.textContent='▼'});const atu = SibQSl(e,'i') ; ATV(atu) ; atu.textContent = asc?'▼':'▲'}
        const table = _table(e)
        const cOl = $('p',_th(e))
        const TBODY = $('tbody',table) // TBODYID ver se o melhor seria isso
        const asc = order ? order === 'asc' : table.dataset.sortOrder !== "asc"
        const Get=E=>$('.P-P',E.children[x])

        const Ordn = [...TBODY.rows].sort((a,b)=>{                    
            if(KeyCtrl(ev)){ // se tiver com Cntrl Selecionado faz o Filtro por Caracteres
                const lenA = (VAL(Get(a)) || '').length
                const lenB = (VAL(Get(b)) || '').length
                return asc ? lenA - lenB : lenB - lenA
            }
            if(cOl=='Data'){
                // 📅 Se ambos forem datas válidas (ex: "2024-12-03")
                    const dateA = new Date(VAL(Get(a)).trim() || '2000-01-01')
                    const dateB = new Date(VAL(Get(b)).trim() || '2000-01-01')           
                    if(!isNaN(dateA) && !isNaN(dateB)){return asc ? dateA-dateB : dateB-dateA}
            }
            // Ordena se for Numeros
                const valA = parseFloat(Txt(Get(a)).replace('R$',''))
                const valB = parseFloat(Txt(Get(b)).replace('R$',''))
                if(!isNaN(valA) && !isNaN(valB)){return asc ? valA-valB : valB-valA}
                
            // Ordena como texto se não forem números
                const txtA = `${VAL(Get(a))}`.replace('R$','')
                const txtB = `${VAL(Get(b))}`.replace('R$','')
                return asc ? txtA.localeCompare(txtB) : txtB.localeCompare(txtA)
        })
        table.dataset.sortOrder = asc ? "asc" : "desc"
        Ordn.forEach(r=>TBODY.appendChild(r))
        TogSeta(e,asc)

        // Voltar ordem ao Normal
    }

        const Join = Find.map(e=>Fn(e)).join('|')
        return  Stg ? Join ? BrevTitle(Typ,Join) : Buttonn : 'Sem Titulo'
    }

    function Tm_Bndj(R,Arr,DOM){
        const r = d_r(R)                                   // Melhorar declarações
        const [Typ,col,Id,Tm]=[r.Ty,r.Cl,r.Id,r.Tm]        // Melhorar declarações (melhor usar _R.Ty e _R.Cl)
        const COL   = Tm=='Bndj' ? AA(col) : BS[Typ].Json[col].LINK.split('-')[0] // isso serve pra acessar qual é a Tabela Passiva
        if(Typ=='PGMT'&&col=='Clnt'){return}
        const dado  = Typ=='GRAD' ? J[Typ].find(j=>j.Id==Id)[col] : JJ[Typ]?.[Id]?.[col]
        const Dados2=dado=>{if(COL=='UBER'){return []} ; if(!dado){return []} ; return `${dado}`.split(' | ').map(e=>{const E = e.split('-') ; if(!E[1]){return null} ; return JJ[E[0].trim()][E[1].trim()]})}

        const Find   = Tm=='Bndj' ? (dado||[]) : Tm=='Link' ? Dados2(dado) : []
        if(Tm=='Link'&&Find[0]==undefined){return}    // só ta aqui pq no Link GRAD quando chamo OS ta dando um ERRO pois um item é Undefined
        const Buttonn = Find.length==0 ? `<button class="Mini" onclick="">+ NOVO ${RmvPlural(D_Brev[COL])}</button>` : ''
        const Title  = FazerTitle(COL,Find,Buttonn)
        const SunPix = Stg=>Stg.split('|').map(p=>parseFloat(p.replace(/[^\d.,]/g,'').replace(',','.'))||0).reduce((sum,n)=>sum+n,0) // Ver se eu Consigo Eliminar isso!
        const NmTle  = col==='Pgmt'? SunPix(Title) : Title.includes('button') ? '' : Title // (GAMBIARRA preparar pra RMV)
        const Cimg   = Find.map(e=>ImgT_T(col,e,R)).join('')
        
        Find.map(e=>`${ALL[col]?.push(e[col])}`)

        const Bandeija=(arr,TYP,_P)=>`<thead><tr>${arr[0].map(t=>`<th>${t}</th>`).join('')}</tr></thead><tbody>${arr.slice(1).map((LL,X)=>`<tr class="tr-${LL[0]}-${X}">${LL.map((v,x)=>Tm_Td(v,LL,x,TYP,_P)).join('')}</tr>`).join('')}</tbody>`
        if(DOM){return `${Find.map((e,x)=>x===0 ? Bandeija(ArrObj_OrdnCol(Find,BS[COL].Orden),COL,R):'').join('')}`} // isso Roda a Situação dentro da Table
        else{return `<div class="Ct" onclick="LoadBndj(this,'${R}');ShowBndj(Pai(this),'${Typ}')">
                <p data-R="${R}" class="P-P T-T Ct PT" name="${NmTle}">${Title}</p>${Cimg}<i class="grifoo PT RD" onclick="Tog_N($('i',this))"><i class="GrifColr"></i></i></div>
                <div class="Rltv w100"><div class="BndjTBL BNdj Abslt none Cl"><a>${SVG.Ponta}</a>
                    <table class="Bdj_${COL} ${COL=='RG'?'':NoVazi(Find[0]?.Id)?'':'none'}"></table>
                    ${Tm=='Bndj'?`<button class="Mini" onclick="AddRowBdj(this,'${R}')">+ Novo ${RmvPlural(D_Brev[COL])}</button>`:
                        Tm=='Link'?`<button class="Mini" onclick="RmvLink('${R}','${col}')">Excluir ${ col }</button><button class="Mini" onclick="Tog_N($('.TrcLINK',Pai(this)))">Trocar ${ col }</button><div class="TrcLINK none">${Tm_Tm['Link2']('',R,'')}</div>`:''}
                </div>
            </div>`
        }
    }

    
    function Tm_Table2(Typ){ // ISSO é o VERDADEIRO tm_Table o outro lá é um Tm_Trs esse deveria ser o 1°
        const Ordn = Typ=='GRD2' ? [X,`${X}_`] : BS[Typ].Orden
        Inn($(`#PagPesq_${Typ}`),Tm_Pesq(Typ))
        Inn($(`#H_${Typ} > thead`),`<tr>${Tm_thSort(BS[Typ].Orden,Typ)}</tr>`)
        Inn($(`#H_${Typ} > tfoot`),`<tr>${Tm_tdFoot(BS[Typ].Orden,Typ)}</tr>`)
        if(Typ=='PDDS'){Inn($(`#H_${Typ} > .Bodd1`), HeadGroupTR  + Tm_Tr(Typ,J[Typ]))  /*TBODYID*/
                  }else{Inn($(`#H_${Typ} > tbody` ),                Tm_Tr(Typ,J[Typ]))} /*TBODYID*/
        Re_Foot(Typ)
    }
    
    function Tm_Table4(Typ,X,Dados){ // ISSO é o VERDADEIRO tm_Table o outro lá é um Tm_Trs
        Inn($(`#PagPesq_${Typ}`),Tm_Pesq(Typ))
        Inn($(`#H_${Typ}_${X} > thead`),`<tr>${Tm_thSort([X,`${X}_`],Typ)}</tr>`)
        Inn($(`#H_${Typ}_${X} > tfoot`),`<tr>${Tm_tdFoot([X,`${X}_`],Typ)}</tr>`)
        Inn($(`#H_${Typ}_${X} > tbody` ),Tm_Tr(Typ,Dados))
    }

    function Tog_Card(Typ){ // Melhorar isso, apenas com CSS
        const Card = Coten($(`#H_${Typ}`),'Card')
        TRs(Typ).forEach(tr=>{AddTrue(tr,'Box3',Card)})
    }

    function PrepTable(Typ){
        const tabtab=(e,m)=>`
        <div class="WrapTable CT ${m}">
            <table id="H_${Typ}${e}" class="hMin Tbla w100">
                <thead class="Stky"></thead>
                <tbody class="Bodd1"></tbody>${Typ=='PDDS'?'<tbody class="Bodd2"></tbody>':''}
                <tfoot class="Stky2"></tfoot>
            </table>
        </div>`
        return `<div class="Bt Stky w90" style="height:40px">
            ${Typ=='PGMT'||Typ=='SERV'?'':`<button onclick="AddROW('${Typ}','<')">+ Nova Linha</button>`}
            <h2 style="font-size:25px">Tabela de ${D_Brev[Typ]}</h2>

            <button onclick="   F_Clen('${Typ}')"> ${SVG.Cler.replace('HOV PT','')}Limpar </button>
        </div>    
        ${Typ=="GRD2" ? `<div class="Paizao w90 CT h80 Gap">${Forns.map(e=>tabtab(`_${e}`,'Grd2')).join('')}</div>` : tabtab('','w90')}
        <p>Soma: 00,00</p>`
    }

<script>
    function SaveConfig(e){LOG('SaveConfig')}
    function __NULL(obj){for(const k in obj){obj[k] ??= ""} return obj}
    async function SB_Get_Filt(Typ,col){const {data}=await supaBASE.rpc('get_unique_col',{t:Typ,c:col}) ; FF[`${Typ}${col}`]=data}

    function Render_PDDS(Typ,      ){Tm_Table2(Typ)}
    function Render_Tbla(Typ,      ){Tm_Table2(Typ)}
    function Render_Tbls(Typ,data      ){Forns.forEach(e=>Tm_Table4(Typ,e,FiltrarR(data,[e,`${e}_`])))}
    function Render_Body(Typ,data,RX,Aa){Tm_tbody(Typ) ; RX ? FazeroGrif(Typ,RX,Aa) : null} // Somente o body

    const Pry = {PDDS:'Id',SERV:'Id',PGMT:'Id',CLNT:'Id',UBER:'Id',MPAG:'Id',ARTE:'Id',GRD2:'Id',REGRA:'Id',GRAD:'Grad',OS:'OS'}

    function fazJJJ(Typ,dados){
        const Colet = {}
        J[Typ]=dados.map(e=>normalizeObj(e,Colet))
        for(const col in Colet){J[AA(col)] = Colet[col] ; JJ[AA(col)] = ArrtoOBJ(Colet[col],Pry[AA(col)])}
        JJ[Typ] = ArrtoOBJ(J[Typ],Pry[Typ])
    }

    async function SB_GETT(Typ,Limit){
        if(Limit==null){
            let todas = [], lim = 1000, ofs = 0, data
            do{({data}=await supaBASE.from(Typ).select('*').order('Id',{ascending:true}).range(ofs,ofs+lim-1))
                if (!data) return ERR('Erro ao carregar dados')
                todas.push(...data) ; ofs+=lim
            }while(data.length===lim)
            LOG(`✔️ Get(${Typ})`) ; return todas
        }else{
            const {data,error}= await supaBASE.from(Typ).select('*').order('Id',{ascending:false}).limit(Limit)
            if(error)return LOG(error)
            LOG(`✔️ Get(${Typ})`) ; return data
        }
    }

    async function SB_Pesq(Typ,Col,Rgx,Aa,Bj){
        const Cols = Col.filter(e=>e!='Lixo'&&e!='Data'&&e!='Valr'&&e!='OKAY'&&e!='user_id'&&e!='Id') // AJEITAR
        const Or = Cols.map(c=>`${c}.${Aa}.${Rgx}`).join(',')
        const {data,error} = await supaBASE.from(Typ).select('*').or(Or).order('Id',{ascending:false}).limit(100)
        if(error)return LOG(error)
        Render_Body(Typ,data,Rgx,Aa)
    }
    async function SB_Filt(Typ,Fls,Modo='E'){
        let q=supaBASE.from(Typ).select('*')
        if(Modo=='E'){Fls.forEach(([c,v])=>q=v.includes('|') ? q.or(v.split('|').map(x=>`${c}.eq.${x}`).join(',')) : q.eq(c,v))}
          else{q=q.or(Fls.flatMap(([c,v])=>v.split('|').map(x=>`${c}.eq.${x}`)).join(','))}
        const {data,error}=await q.order('Id',{ascending:false}).limit(100)
        if(error)return LOG(error)
        Render_Body(Typ,data)
    }

    function RodaTable(Typ){
        if(Typ=='GRAD'){LOAD('GRAD');LOAD('UBER'),LOAD('GRD2');LOAD('OS')}else{LOAD(Typ)}
        async function LOAD(TYP){
            const data = await SB_GETT(TYP,100) ; fazJJJ(TYP,data)
            TYP=='PDDS' ? Render_PDDS(TYP,data) : TYP=='GRD2' ? Render_Tbls(TYP,data) : Render_Tbla(TYP,data)
        }
    }

    async function GetLink(Typ){
        const {data}=await supaBASE.from('PDDS').select(`*,CLNT(*)`)
        LOG(data)
    }
</script>
