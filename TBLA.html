<script> // ----- GRIFO -----
    const RmvGrifo=e=>{
        Inn(e,Inn(e).replace(/<strong[^>]*>(.*?)<\/strong>/gi,"$1")) ; Rmv(e,'Psq')
    }
    const Grifar_Not=(tr,Typ,Val)=>{
        const td = _td($(Rx7(Typ,Val[0]),tr))
        Add(td,'GrifNot1')             // Div agora Possúi GrifNot do Tipo 1
        Inn($('.grifoo i',td),Val[2])  // Atribuir o Valor pra dentro do GrifNot
    }
    const GrifTxt=(t,Regex)=>{
        if(!Regex){return t} ; const [Rx,Aa,_C] = Regex
        const Rgx=new RegExp(_C?Rx:Acnto3(Rx),Aa?'':'i')
        const m=Rgx.exec(t); if(!m)return t; const i=m.index,f=i+m[0].length
        return t.slice(0,i)+`<strong>${t.slice(i,f)}</strong>`+t.slice(f)
    }
    function DOM_Grif(Typ,Regex){
        TRs2(Typ,'1').forEach(tr=>{
            $$('.GrifNot1',tr).forEach(e=>Rmv(e,'GrifNot1'))
            $$('.P-P',tr).forEach(p=>{RmvGrifo(p) ; if(TagVoid.has(e.tagName)){Add(e,'Psq')}else{Inn(p,GrifTxt(Nm(p),Regex))}})
        })
    }
</script>

        Inn($('.Sugg',Eu),Tm_FList(NovoArry,Typ,col))
    }

    function F_Clik(Eu,Typ,col,val){        // ✔️ Pinta o Filt com Ativo e Desativo

    const Rodelaaa=Arr=>Object.entries(Arr.reduce((a,[k,v])=>(a[k]=a[k]?a[k]+'|'+v:v,a),{}))

    function Ex_Filt(Typ,col){              // ✔️ Executa o Filto na Tabela

    function F_Rndn(Typ,col){               // ✔️ Randomiza   parece q tbm n tem xDOM
        const noCopy       = true // impedir que pinte quando não tem cópias
        const PermitOculta = true // opção pra ocultar quem n tem Randon
        const QRY   = `#H_${Typ} > tbody > tr > ${COLLLL(Typ,col)} > div > .P-P`
        const ObbjClnt=()=>$$(QRY).map(e=>Inn(e))
        let NewObj = {}
        const QntCores = Uniq(ObbjClnt()).length
        const CoresEtr = ObjEtr(cRepet(ObbjClnt())).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
                    if(noCopy&&v===1   ){} // não faz nada caso seja apenas 1 ocorrência
            else if(!k||k.trim()==''){} // n faz nada caso seja vazio
            else{if(true){NewObj[k]=RandoCor()}  // cor Randon
                    else{NewObj[k]=v}}               // do maior pra o menor
        })
        $$(QRY).forEach(e=>{Bkg(_tr(e),NewObj[Inn(e)])
            if(PermitOculta && NewObj[Inn(e)]==undefined){Add(_tr(e),'none')} // tentar mudar pra UndfNull(NewObj[Inn(e)]) // pra usar a biblioteca
        })
        // pra melhorar o Randomize
        // ele deveria Randomizar com um Limite de cores dentro de um intervalo específico
        // e quando eu quser Pintar apenas o Td
    }
    
    function F_Clen(Typ){                   // ✔️ Limpa todos os Filtros
        TRs(Typ).forEach(e=>{For(20).forEach(E=>Rmv(e,`n${E}`)) ; Bkg(e,'')}) // Exibe todas as Linhas e Limpa o Random
        $$('.ThFilt b'  ).forEach(e=>None(e)) // Limpa Notifi dos Filter
        const Class = ['ThFilt_Atv','ThFilt_Rtv','filtTrue','filtFals','SelectSoma']
        Class.forEach(e=>{$$(`.${e}`).forEach(E=>{Rmv(E,e)})})
    }

    function Orden(e,ev,x,order=null){      // ✔️
        const AllI    =(table,Atv=null)=>$$(`:scope > thead > tr > th ${Atv=='Atv'?'i.Atv':'i'}`,table)
        function TogSeta(e,asc){AllI(_table(e)).forEach(i=>{DTV(i);i.textContent='▼'});const atu = SibQSl(e,'i') ; ATV(atu) ; atu.textContent = asc?'▼':'▲'}
        const table = _table(e)
        const cOl = $('p',_th(e))
        const TBODY = $('tbody',table) // TBODYID ver se o melhor seria isso
        const asc = order ? order === 'asc' : table.dataset.sortOrder !== "asc"
        const Get=E=>$('.P-P',E.children[x])

        const Ordn = [...TBODY.rows].sort((a,b)=>{                    
            if(KeyCtrl(ev)){ // se tiver com Cntrl Selecionado faz o Filtro por Caracteres
                const lenA = (VAL(Get(a)) || '').length
                const lenB = (VAL(Get(b)) || '').length
                return asc ? lenA - lenB : lenB - lenA
            }
            if(cOl=='Data'){
                // 📅 Se ambos forem datas válidas (ex: "2024-12-03")
                    const dateA = new Date(VAL(Get(a)).trim() || '2000-01-01')
                    const dateB = new Date(VAL(Get(b)).trim() || '2000-01-01')           
                    if(!isNaN(dateA) && !isNaN(dateB)){return asc ? dateA-dateB : dateB-dateA}
            }
            // Ordena se for Numeros
                const valA = parseFloat(Txt(Get(a)).replace('R$',''))
                const valB = parseFloat(Txt(Get(b)).replace('R$',''))
                if(!isNaN(valA) && !isNaN(valB)){return asc ? valA-valB : valB-valA}
                
            // Ordena como texto se não forem números
                const txtA = `${VAL(Get(a))}`.replace('R$','')
                const txtB = `${VAL(Get(b))}`.replace('R$','')
                return asc ? txtA.localeCompare(txtB) : txtB.localeCompare(txtA)
        })
        table.dataset.sortOrder = asc ? "asc" : "desc"
        Ordn.forEach(r=>TBODY.appendChild(r))
        TogSeta(e,asc)

        // Voltar ordem ao Normal
    }

    function FiltMes(Mes,Typ){

        SERV:{Critr:j=>{return {'Serv':j.Serv!=='','Arte':j.Arte!=='','Grad':j.Grad!=='','OK':j.OK==true,'Entg':j.Entg==true}}
    }}
    const GetStts=(arr,O,L)=>{
        const S=new Set(arr), m=O.find(e=>!S.has(e)), l=[...O].reverse().find(e=>S.has(e))
        if(!l) return L[m] ; if(!m) return L[O.at(-1)]
        if(O.indexOf(m)<O.indexOf(l)){ const r={...L[m]}, k=Object.keys(r)[0] ; r[k]=L[l][k] ; return r } return L[l]
    }
</script>

<script> // ---- AUTOCOMP ----
    const Regra=v=>v==0 ? 0 : v < 10 ? 10 : v

    const COMP = {
        PDDS:{Valr:j=>SOMA_Obj(j.Serv,'Valr')
             ,Cust:j=>SOMA_Obj(j.Serv,'VCbt') // tem que Somar com ARTE e GRAD futuramente VCbt vai virar Custo Geral uma tabela separada
             ,Deve:j=>j.Valr-SOMA_Obj(j.Pgmt,'Valr')
             ,Lcro:j=>j.Valr-j.Cust
             //,Stts:j=>Depende dos Stts Internos e dos Valores Já calculados (Valr,Cust,Deve,Lcro)
        },
        SERV:{Stts:j=>{
                const Critr = STATUS['SERV']['Critr'](j)
                const Todos = ObjKey(Critr)
                const Atual = ObjEtr(Critr).filter(([k,v])=>v==true).map(e=>e[0]) // Filtrar só os True
                const opc   = _0_1(Atual.length/Todos.length)                     // Part/Total
                const Etp   = GetStts(Atual,Todos,LALEL['SERV'])
                const BkPcy = `rgba(${Etp.Cor},${(opc).toFixed(2)})` // ver se faço Helper com isso!
                return {Opc:opc,BkPcy:BkPcy,...Etp}
                R_Cor(tr,opc(ss),E[1],BkPcy,TxPcy) // quando for pra Pintar o TR, é assim que se Faz, msm coisa pra o Td
            }
            //Tipo:j=>j.Serv?Vari(j.Serv):[], //Opt
            //Surg:j=>{return Seguro(j.Alt * j.Lag * j.Qnt * Prod[j.Serv]?.Tipos[j.Tipo]?.Valr).toFixed(2)}},
        },
        GRAD:{ImgU:j=>`${j.Id}.webp` ?? ''                     // OK
             ,ImgG:j=>`${j.Id.replace(/_\d*$/,"")}.webp` ?? '' // OK
             ,Forn:j=>Dbbrev[j.Id.split('_')[0]]               // OK
             ,VlrO:j=> j.OS?.Valr || 0                         // OK
             ,Valr:j=>j.Forn=='Barraca' ? j.Qnt * 120 : Regra(NAN(j.Lag * j.Alt * ValForn[j.Forn]?.[j.SrvF]?.[0]?.val)) * j.Qnt},
        OS  :{Oimg:j=>`${j.Id}.webp` ?? ''},                   // OK
        UBER:{Img :j=>`${j.Id}.webp` ?? ''},                   // OK
        CLNT:{Lcro:j=>j.Pdds?.Valr ?? 0
             ,Medi:j=>{const q = ContCLNT[j.Id]?.Qnt; const s = ContCLNT[j.Id]?.Sum; return (q != null && s != null && s !== 0) ? (s / q).toFixed(2) : ""}
            },
        ARTE:{Dsng:j=>j ? ['do Cliente','Ja Tinha','n Precisa'].includes(j.TArt)?['--']:FiM(O['Dsng']) : O['Dsng'], //Opt
              TArt:j=>j ? Prod[j.Serv]?.Etpa.includes('Arte')?FiM(O['TArt']):['n Precisa'] : O['TArt'], //Opt
               Img:j=>J['IMGS'][j.Nome] ?? '' // não sei se isso é exatamente AUTO, vamos ver lá!
            },        
    }

    function AutoCOMP(Typ,Arr=J[Typ]){
        if(Typ=='ARTE'||Typ=='CLNT'){return}
        if(!isArr(Arr)) return
        Arr.forEach(j=>{
            ObjKey(COMP?.[Typ]||{}).forEach(c=>{ // aplica COMP na 1° Camada
                const fn=COMP?.[Typ]?.[c] ; const V=fn?.(j) ?? '' // Coleta o Valor
                j[c]=V ; JJ?.[Typ]?.[j.Id] && (JJ[Typ][j.Id][c]=V) // Aplica os J e JJ
            })
            ;(BS[Typ]?.FK||[]).forEach(fk=>{ // percorre FKs internas
                const Key=AA(fk) ; const V=j[fk]||j[Key]
                if(isArr(V)) AutoCOMP(Key,V)
                else if(V && typeof V=='object') AutoCOMP(Key,[V])
            })
        })  
    }
</script>

<script> // ---- RECOLOR ----
    function LimpaCor(tr){Bkg(tr,'') ; $$('td',tr).forEach(e=>e.style.border='')} // Limpa cor de um tr

    function R_Cor(e,opc,Cor,BkPcy,TxPcy){ // nesta função dar apeans o Retorno caso "e" não seja DOM
        if(e.tagName=='TD'){Bkg(e,BkPcy)}  // Colore o Fundo com Opacidade
        else{Bkg(e,`rgb(${Cor.split(',').map(v=>Math.round(+v+(255-v)*(1-opc))).join(',')})`)} // Colore o Fundo sem Opacidade
        e.style.color        = TxPcy
        e.style.borderBottom = `1px solid rgba(${Cor},${(opc).toFixed(2)})`   // Colore a Borda
        $$('select',e).forEach(E=>Bkg(E,'#00000000'))
    }
    
    function Re_Colr(Typ,tr){ // isso aqui deve fazer a Soma Dos Status Internos pra poder Pintar si mesmo
        if(Typ==='PDDS'){
            let ss = ''                                          // Traz pra cá alem do ss todas as info importantes
            const opc   = e=>e.reduce((a,v)=>a+v[0],0)/e.length
            const Menor = arr=>arr?.length ? arr.reduce((m,a) => O['Stts'].indexOf(a[2][0]) < O['Stts'].indexOf(m[2][0]) ? a : m) : null
            const Exec  = (typ,Mod)=>{const s = getArr(JJ[Typ][tr_ID(tr)][Aa(typ)]).map(tr2=>R_Colr(tr2.Id,typ,Mod,tr,CrBS(typ))) ; if(typ=='SERV'){ss=s}} // soma Opacidade de 'Clnt','Serv','Pgmt'
            Exec('SERV','Etapa')
            Exec('PGMT','Temperatura')
            Exec('CLNT','Temperatura')
            const Etp = Menor(ss)[2]
            const Vlr = tr.Valr
            const Pag = Soma(tr.Pgmt)
            const Dev = Etp[0]=='Entregue' && Nm(Vlr) > Nm(Pag)
            const E = Dev ? LALEL['SERV']['Deve'] : Etp
            IcnEtp(Typ,tr,E)                                     // Adicionar o Icone de Etapas
            R_Cor(tr,opc(ss),E[1])                               // Pintar o Tr
            Bkg(Vlr,`rgb(${E[2]})`,E[3])                         // Pintar o P-P de Valr
            if(Dev){$$('td',tr).forEach(d=>Bkg(d,''))}           // Quando Tiver Devendo Limpar as Cores dos Td
        }
    }
</script>

        if(Modo=='E'){Fls.forEach(([c,v])=>q=v.includes('|') ? q.or(v.split('|').map(x=>`${c}.eq.${x}`).join(',')) : q.eq(c,v))}
          else{q=q.or(Fls.flatMap(([c,v])=>v.split('|').map(x=>`${c}.eq.${x}`)).join(','))}
        const {data,error}=await q.order('Id',{ascending:false}).limit(100)
        if(error)return LOG(error)
        Render_Body(Typ,data)
    }

    function RodaTable(Typ){
             if(Typ=='GRAD'){LOAD('GRAD');LOAD('UBER'),LOAD('GRD2');LOAD('OS')}
        else if(Typ=='PDDS'){LOAD('PDDS');LOAD('SERV');LOAD('PGMT')           }
        else                {LOAD(Typ)                                        }
        async function LOAD(TYP){
            let selectStr = `*${BS[TYP]?.FK?.length ? ',' + BS[TYP]?.FK?.map(t=>`${t}:${AA(t)}(*)`).join(',') : ''}`
            const OrdemN  = ['PDDS','SERV','PGMT'].includes(TYP) ? 'Data' : 'Id'
            const Camada2 = {PDDS:'PDDS(*,Clnt:CLNT(*),Serv:SERV(*),Pgmt:PGMT(*))'} // se for Clnt não deveria nem ter a Coluna CLNT se n vira paradoxo
            if(TYP=='CLNT'||TYP=='SERV'||TYP=='PGMT'){selectStr = selectStr.replace('PDDS(*)',Camada2['PDDS'])}
            const data = await SB_GETT(TYP,200,selectStr,OrdemN) ; fazJJJ(TYP,data) ; AutoCOMP(TYP)
            TYP=='GRD2' ? Render_Tbls(TYP) : Render_Tbla(TYP)
        }
    }
</script>
