    function CriaselectStr(Typ){
        const Cl = (TYP,Rmv)=>ArrDif(BS[TYP]?.Orden,Rmv).join(',')
        const Construc = {
            PDDS:{Clnt:{},Serv:{Arte:{},Grad:{}},Pgmt:{Mpag:{}}}, // `*,Clnt:CLNT(*),Serv:SERV(*,Arte:ARTE(*),Grad:GRAD(*)),Pgmt:PGMT(*,Mpag:MPAG(*))`
            SERV:{Pdds:{},Arte:{},Grad:{}},// 'Pdds:PDDS(*),Arte:ARTE(*),Grad:GRAD(*)'
            PGMT:{Pdds:{},Mpag:{}},        // 'Pdds:PDDS(*),Mpag:MPAG(*)'
            CLNT:{Pdds:{Serv:{},Pgmt:{}}}, // 'Pdds:PDDS(*,Serv:SERV(*),Pgmt:PGMT(*))'
            MPAG:{Pgmt:{}},                // 'Pgmt:PGMT(*)'
            ARTE:{Serv:{}},                // 'Serv:SERV(*)'
            GRAD:{Serv:{},OS:{},Uber:{}},  // 'Serv:SERV(*),OS:OS(*),Uber:UBER(*)'
            OS  :{Grad:{},Mpag:{}},        // 'Grad:GRAD(*),Mpag:MPAG(*)',
            UBER:{Grad:{},Mpag:{}},        // 'Grad:GRAD(*),Mpag:MPAG(*)',
        }
        const f = (o,p='')=>ObjEtr(o).map(([k,v])=>`${k}:${AA(k)}(${Cl(AA(k),Ryp[`${Typ}_${k}`])}${ObjKey(v).length?','+f(v,k):''})`).join(',')
        //LOG('PDDS =',`*,${f(Construc[Typ])}`)
        return `*,${f(Construc[Typ])}`
    }

    function SB_CriaSlct(Typ,COL){
        
        const Cl = (TYP,Rmv)=>ArrDif(BS[TYP]?.Orden,Rmv).join(',')
        const FK = (TYP,Col)=>`${Col}:${AA(Col)}(${Cl(AA(Col),Ryp[`${TYP}_${Col}`])})`
        
        const Fk2 = {PDDS_Serv:()=>`,${['ARTE','GRAD'].map(e=>FK('SERV',e)).join('')}`}
        const FK2 = (TYP,Col)=>`${Col}:${AA(Col)}(${Cl(AA(Col),Ryp[`${TYP}_${Col}`])}${Fk2[`${TYP}_${Col}`]()})` // Clnt:CLNT(${Cl('CLNT',R['PDDS_Clnt'])})

        const selectStr = { // isso tem que ficar Fora, pois deve ser Chamado, tanto por RodaTable() mas tbm por Filtros, Sugg, Pesquisas e outros, deve conciderar tudo isso!
                 PDDS:`${Cl(Typ)},${FK(Typ,'Clnt')},${FK(Typ,'Serv')},${FK(Typ,'Pgmt')}`, // Clnt:CLNT(${Cl('CLNT',R.PDDS_Clnt)}),Serv:SERV(${Cl('SERV',R.PDDS_Serv)}),Pgmt:PGMT(${Cl('PGMT',R.PDDS_Pgmt)})`,
                 SERV:`${Cl(Typ,['Cbmt','VCbt'])}, Pdds:PDDS(${Cl('PDDS',Ryp.SERV_Pdds)}),Clnt:PDDS(CLNT(${Cl('CLNT',Ryp.PDDS_Clnt)})),Arte:ARTE(${Cl('ARTE',['Serv'])}),Grad:GRAD(${Cl('GRAD',['Serv'])})`,
                 PGMT:`${Cl(Typ)}, Pdds:PDDS(${Cl('PDDS',Ryp.PGMT_Pdds)}),Clnt:PDDS(CLNT(${Cl('CLNT',Ryp.PDDS_Clnt)})),Mpag:MPAG(*)`,
                 CLNT:`${Cl(Typ)}, Pdds:PDDS(${Cl('PDDS',Ryp.CLNT_Pdds)},Serv:SERV(${Cl('SERV',Ryp.CLNT_Pdds)}),Pgmt:PGMT(${Cl('PGMT',Ryp.CLNT_Pdds)}))`,

                 MPAG:`${Cl(Typ)}, Pgmt:PGMT(${Cl('PGMT',['Mpag'])})`, // Dentro de PGMT trás o FK de Clnt, q fica dentro de PDDS
                 ARTE:`${Cl(Typ)}, Serv:SERV(${Cl('SERV',['Arte'])})`, // Dentro de SERV trás o FK de Clnt, q fica dentro de PDDS
                 GRAD:`${Cl(Typ)}, Serv:SERV(${Cl('SERV',['Grad'])}),OS:OS(*),Uber:UBER(*)`, // Dentro de SERV trás o FK de Clnt, q fica dentro de PDDS
                 OS  :`${Cl(Typ)}, Grad:GRAD(${Cl('GRAD',['OS'  ])}),Mpag:MPAG(*)`,
                 UBER:`${Cl(Typ)}, Grad:GRAD(${Cl('GRAD',['Uber'])}),Mpag:MPAG(*)`,

            PDDS_CLNT:()=>`${Cl(COL,Ryp[`${Typ}_${Aa(COL)}`])}`,
            SERV_ARTE:()=>`${Cl(COL,Ryp[`${Typ}_${Aa(COL)}`])}`,
            SERV_GRAD:()=>`${Cl(COL,Ryp[`${Typ}_${Aa(COL)}`])}`,
            GRAD_OS  :()=>`${Cl(COL,Ryp[`${Typ}_${Aa(COL)}`])}`,
            GRAD_UBER:()=>`${Cl(COL,Ryp[`${Typ}_${Aa(COL)}`])}`,

        }
        if(COL){return selectStr[`${Typ}_${COL}`]()}
        if(Typ=='PDDS'){return CriaselectStr(Typ)}

        return COL ? selectStr[`${Typ}_${COL}`]() : selectStr[Typ]
    }
</script>

        const [bj,aa,cc,a_,ii,ot,of] = ObjKey(oPesq).map(e=>!!$(`.Pesq_${typ} .Pesq-${e}.Atv`))
        const {data,error}=await supaBASE.rpc('pesq_all',{typ,busca,bj,aa,cc,a_,ii,ot,of,ord:'Id',lim:100})
        if(error)return LOG(error) ; LOG('Pesq',typ,busca) ; Render_Body(typ,data,[busca,aa,cc])
    }

    function DOM_Pesq(Typ){
        const busca = Trim($(`.Pesq_${Typ} input`).value)
        const [bj,aa,cc,a_,ii,ot,of] = ObjKey(oPesq).map(e=>!!$(`.Pesq_${Typ} .Pesq-${e}.Atv`))
        const getV = (j,c)=>{
            if(!BS[Typ].FK?.includes(c)) return [String(j[c])]
            return (j[c]||[]).map(x=>{let v = x[c] ; while(typeof v==='object'&&v!==null) v=Object.values(v)[0] ; return String(v)})
        }
        const isMatch=(j)=>{
            for(const c in j){const vals = getV(j,c) ; if(vals.some(v=>String(v).toLowerCase().includes(busca.toLowerCase()))) return true}
            return false
        }
        const Res = J[Typ].filter(isMatch)
        $$(`#H_${Typ} > tbody > tr`).forEach(tr=>Add_N(tr))
        Res.forEach(j=>{const tr = $(`#H_${Typ} > tbody > .tr-${j.Id}`) ; if(tr) Rmv_N(tr)})

</script>

<script> // ---- FILTRO ----
    const Colx    =(Typ,col)=>FIdx(BS[Typ].Orden,col)+1

    const Rodelaaa=Arr=>Object.entries(Arr.reduce((a,[k,v])=>(a[k]=a[k]?a[k]+'|'+v:v,a),{}))
    function FiltrarNum(Typ,Col,Min,Max){LOG(Typ,Col,Min,Max)}

                    <input placeholder="pesq">
                    <img class="HOV PT Ct" onclick="TOV(this); F_Rndn('${Typ}','${col}')" src="./SVG/Icon_Randomizar.svg">

    function Tm_Filt(Eu,Typ,col,Bs){        // ✔️ RENDERIZA FILT DOM Depende da Tabela Carregada
        BSFIL[Typ]??={} ; if(BSFIL[Typ][col]==true){return} ; BSFIL[Typ][col]=true // evitar carrergar 2 vezes

        const Lista = Bs =='J'          ? Uniq(J[Typ].map(E=>E[col])) :
                      Bs.includes('O-') ? O[Bs.split('-')[1]]         :
                      Bs =='Date'       ? ''                          :

                      'nada'
        const NovoArry = Lista.map(e=>e===''?"'Vazio'":e).sort(e=>e==="'Vazio'"?-1:1)
        Inn($('.Sugg',Eu),Tm_FList(NovoArry,Typ,col))

    function F_Clik(Eu,Typ,col,val){        // ✔️ Pinta o Filt com Ativo e Desativo
        const [r,a]=['ThFilt_Rtv','ThFilt_Atv']
        const PP = $('p',Pai(Eu)) // Valor Clicado

        if(Inn(Eu)=='+'){if(Coten(PP,r)){Rmv(PP,r)}else{Tog(PP,a)}}
        const Notifi=e=>{const l = $$(`.ThFilt_${e}`,_th(Eu)).length ; const n = $(`b.${e}`,_th(Eu)) ; if(l==0){None(n)}else{Show(n)} ; Inn(n,l) } // Atualiza Notificações + ou -
        Notifi('Atv') ; Notifi('Rtv')
    }

    function Ex_Filt(Typ,col){              // ✔️ Executa o Filto na Tabela
        const aTV = $$(`#H_${Typ} > thead .ThFilt_Atv`).map(e=>[e.dataset.col,Txt(e)])
        const rTV = $$(`#H_${Typ} > thead .ThFilt_Rtv`).map(e=>[e.dataset.col,Txt(e)])       
        //LOG(Rodelaaa(aTV))
        //const aTV = $$(`#H_${Typ} > thead .ThFilt_Atv`).map(e=>Txt(e)).join('|') ; const RxAtv = new RegExp(aTV,'i')
        //const rTV = $$(`#H_${Typ} > thead .ThFilt_Rtv`).map(e=>Txt(e)).join('|') ; const RxRtv = new RegExp(rTV,'i')
        //LOG(RxAtv,RxRtv) // Positivos e Negativos de uma Unica Coluna
        const Filtros=[['Tipo','Recriação'],['Dsng','Allan|Baby']] // Exemplo
        //const Modo = 'E' // ou 'E'
        //SB_Filt(Typ,Rodelaaa(aTV),Modo)
        DOM_Filt(Typ,col,Rodelaaa(aTV),Rodelaaa(rTV))
    }

    function DOM_Filt(Typ,col,aTV,rTV){
        const getMatch=(j,c,val)=>{
            const Vl = val.split('|')
            // FK (array de objetos)
            if(BS[Typ].FK?.includes(c)){
                return (j[c]||[]).some(x=>{
                let v=x[c]
                while(typeof v==='object'&&v!==null) v=Object.values(v)[0]
                return Vl.includes(String(v))
                })
            }
            const v = j[c]
            // OBJETO (não FK, mas é obj)
            if(typeof v==='object'&&v!==null){
                let vv = v[c]
                while(typeof vv==='object'&&vv!==null) vv=Object.values(vv)[0]
                return Vl.includes(String(vv))
            }
            // NORMAL
            return Vl.includes(String(v))
        }

        const isMatch=(j)=>{
            for(const [c,v] of aTV){if(!getMatch(j,c,v)) return false}
            for(const [c,v] of rTV){if( getMatch(j,c,v)) return false}
            return true
        }
        const Res = J[Typ].filter(isMatch)
        $$(`#H_${Typ} > tbody > tr`).forEach(tr=>Add_N(tr)) // Limpar
        Res.forEach(j=>{const tr = $(`#H_${Typ} > tbody > .tr-${j.Id}`) ; if(tr) Rmv_N(tr)}) // Ocultar
    }

    function F_Clen(Typ){                   // ✔️ Limpa todos os Filtros
        TRs(Typ).forEach(e=>{For(20).forEach(E=>Rmv(e,`n${E}`)) ; Bkg(e,'')}) // Exibe todas as Linhas e Limpa o Random
        $$('.ThFilt b'  ).forEach(e=>None(e)) // Limpa Notifi dos Filter
        const Class = ['ThFilt_Atv','ThFilt_Rtv','filtTrue','filtFals','SelectSoma']
        Class.forEach(e=>{$$(`.${e}`).forEach(E=>{Rmv(E,e)})})
    }

        Inn($(`#H_${Typ} > tbody`),Tm_Tr(Typ,Filt)) // TBODYID
        RFresh(Typ,'All')
    }

    function SyncRangNum(e){
        let R=Avo(e),a=Vll($('.R1',R)),b=Vll($('.R2',R)) ; if(a>b)[a,b]=[b,a]
        Inn($('.Rang-Min',R),a) ; Inn($('.Rang-Max',R),b)

    async function SB_Filt(Typ,Fls,Modo='E'){

<script> // ---- ORDEN ----
    function Orden(e,ev,x,order=null){      // ✔️
        const AllI    =(table,Atv=null)=>$$(`:scope > thead > tr > th ${Atv=='Atv'?'i.Atv':'i'}`,table)
        function TogSeta(e,asc){AllI(_table(e)).forEach(i=>{DTV(i);i.textContent='▼'});const atu = SibQSl(e,'i') ; ATV(atu) ; atu.textContent = asc?'▼':'▲'}
        const table = _table(e)
        const cOl = $('p',_th(e))
        const TBODY = $('tbody',table) // TBODYID ver se o melhor seria isso
        const asc = order ? order === 'asc' : table.dataset.sortOrder !== "asc"
        const Get=E=>$('.P-P',E.children[x])

        const Ordn = [...TBODY.rows].sort((a,b)=>{                    
            if(KeyCtrl(ev)){ // se tiver com Cntrl Selecionado faz o Filtro por Caracteres
                const lenA = (VAL(Get(a)) || '').length
                const lenB = (VAL(Get(b)) || '').length
                return asc ? lenA - lenB : lenB - lenA
            }
            if(cOl=='Data'){
                // 📅 Se ambos forem datas válidas (ex: "2024-12-03")
                    const dateA = new Date(VAL(Get(a)).trim() || '2000-01-01')
                    const dateB = new Date(VAL(Get(b)).trim() || '2000-01-01')           
                    if(!isNaN(dateA) && !isNaN(dateB)){return asc ? dateA-dateB : dateB-dateA}
            }
            // Ordena se for Numeros
                const valA = parseFloat(Txt(Get(a)).replace('R$',''))
                const valB = parseFloat(Txt(Get(b)).replace('R$',''))
                if(!isNaN(valA) && !isNaN(valB)){return asc ? valA-valB : valB-valA}
                
            // Ordena como texto se não forem números
                const txtA = `${VAL(Get(a))}`.replace('R$','')
                const txtB = `${VAL(Get(b))}`.replace('R$','')
                return asc ? txtA.localeCompare(txtB) : txtB.localeCompare(txtA)
        })
        table.dataset.sortOrder = asc ? "asc" : "desc"
        Ordn.forEach(r=>TBODY.appendChild(r))
        TogSeta(e,asc)

        // Voltar ordem ao Normal
    }
</script>

                        ${Tm=='Bndj'?`<button class="Mini" onclick="AddRowBdj(this,'${R}')">  + Novo  ${RmvPlural(D_Brev[COL]||'NADA')}</button>`:

    }

    async function AddRowBdj(Eu,R){ // ⭐⭐⭐⭐_ // Por enquanto só pra SERV e PGMT
        const _R    = d_r(R) ; const COL = AA(_R.Cl)
        const Tabl = $('table',_td(Eu)) ; Rmv_N(Tabl)
        if(['SERV','PGMT'].includes(COL)){
            const {data,error} = await supaBASE.rpc('Add_NewBndj',{tbl:COL,pai:_R.Id,typ:Aa('PDDS'),dados:{}}) // dentro de dados. aqui fica o obj, provavelmente dar null nos FK q merda
            __NULL(data)
            // data.Id.split('_')[1]=='1' se for o primeiro cria tudo se não só adiciona
            const Find = RmvKeys(data,Ryp[`${_R.Ty}_${_R.Cl}`])
            LOG(Find)
            if($('tbody',Tabl)){Befor($('tbody',Tabl),Tm_Tr(COL,[Find]))}
            else{Acc_Bndj[`${_R.Ty}-${_R.Id}-${_R.Cl}`]=[Find] ; LoadBndj(Avo(Eu),R,'Btn')}   // Agora Limpar as Colunas desnessesárias
        }
        // Novo Id // Clona Cliente
    }
    
    function Tm_Table(Typ){ // ISSO é o VERDADEIRO tm_Table o outro lá é um Tm_Trs esse deveria ser o 1°
        const Ordn = Typ=='GRD2' ? [X,`${X}_`] : BS[Typ].Orden
        Inn($(`#PagPesq_${Typ}`),Tm_Pesq(Typ))
        Inn($(`#H_${Typ} > thead`),`<tr>${Tm_thSort(Typ,ArrDif(BS[Typ].Orden,['Cbmt','VCbt']))}</tr>`)
        Inn($(`#H_${Typ} > tfoot`),`<tr>${Tm_tdFoot(Typ,BS[Typ].Orden)}</tr>`)
        Inn($(`#H_${Typ} > tbody`),Tm_Tr(Typ,J[Typ]))
        Re_Foot(Typ)
    }
    
    function Tm_Table4(Typ,X,Dados){ // isso carrega em GRAD2 melhorar isso, e Fundir com CIMA
        Inn($(`#PagPesq_${Typ}`),Tm_Pesq(Typ))
        Inn($(`#H_${Typ}_${X} > thead`),`<tr>${Tm_thSort(Typ,[`${X}_`,X])}</tr>`)
        Inn($(`#H_${Typ}_${X} > tfoot`),`<tr>${Tm_tdFoot(Typ,[`${X}_`,X])}</tr>`)
        Inn($(`#H_${Typ}_${X} > tbody` ),Tm_Tr(Typ,Dados))
    }

    function Render_Tbla(Typ         ){Tm_Table(Typ)}
    function Render_Tbls(Typ         ){Forns.forEach(e=>Tm_Table4(Typ,e,FiltrarR(J[Typ],[e,`${e}_`])))}
    function Render_TblP(Typ         ){Tm_Table(Typ)}
    function Render_Body(Typ,data,Rgx){AutoCOMP(Typ,data) ; Tm_tbody(Typ,data,Rgx)}
    function RecaregaMes(Typ,Mes){LOG(Typ,Mes) ; RodaTable(Typ,Mesess[Mes])}

    function PrepTable(Typ){
        const tabtab=(e,m)=>`
        <div class="WrapTable CT ${m}">
            <table id="H_${Typ}${e}" class="hMin Tbla w100">
                <thead class="Stky"></thead><tbody></tbody><tfoot class="Stky2"></tfoot>
            </table>
        </div>`
        return `<div class="Bt Stky w90" style="height:40px">
            ${Typ=='PGMT'||Typ=='SERV'?'':`<button onclick="SB_AddROW('${Typ}')">+ Nova Linha</button>`}
            <h2 style="font-size:25px">Tabela de ${D_Brev[Typ]}</h2>
            <div id="PagPesq_${Typ}" class="PagPEsq w40"></div>
            <div id="COnf_${Typ}"    class="Configs CT">
                ${Tm_Interup2(SVG.List,SVG.Card,`TrcTog($('#H_${Typ}'),'Tbla','Card');Tog_Card('${Typ}')`)}
                ${Tm_Check2(SVG.RszH,'',`ReszH('${Typ}')`)}
                ${Tm_Check2(SVG.RszW,'',`ReszW('${Typ}')`)}
            </div>
            <select onchange="RecaregaMes('${Typ}',this.value)">${Tm_Opt(['Meses',...ObjKey(Mesess)])}</select>
            <button onclick="LOG('deve fazer a Requisição Novamente')">Recarregar</button>
            <button onclick="   F_Clen('${Typ}')"> ${SVG.Cler.replace('HOV PT','')}Limpar </button>
        </div>    
        ${Typ=="GRD2" ? `<div class="Paizao w90 CT h80 Gap">${Forns.map(e=>tabtab(`_${e}`,'Grd2')).join('')}</div>` : tabtab('','w90')}
        <p>Soma: 00,00</p>`
    }

    function GAMBIARRAA(Find){ // Gambiarra pra remover Clnt de todos Serv Bndj q está dentro de PDDS
        Find.forEach(j=>{j.Serv.forEach(e=>{delete e['Clnt']})
                         j.Pgmt.forEach(e=>{delete e['Clnt']}) })
    }

    async function RodaTable(Typ,Mes=['2026-07-01','2026-08-01']){
        if(carregado.includes(Typ) && Mes==null){return} ; carregado.push(Typ)
        const selectStr = SB_CriaSlct(Typ)
        const data = Typ=='PDDS' ? await SB_GETT(Typ,null,selectStr,'Data',null,Mes) :
                     Typ=='GRAD' ? await SB_GETT(Typ,null,selectStr,'Id',null,null,{Id:'B\\_%'}) :
                                   await SB_GETT(Typ,100,selectStr,BS[Typ].Ordnn)
        fazJJJ(Typ,data) ; AutoCOMP(Typ) ; if(Typ=='PDDS'){GAMBIARRAA(J[Typ])}
        Typ=='GRD2' ? Render_Tbls(Typ) : Typ=='PDDS' ? Render_TblP(Typ) : Render_Tbla(Typ) // GAMBIARRA logo logo vai sair
    }

    async function Read_Tr(Tr,Typ,Id){ // Geralmente quando tenho acesso a ela
        const selectStr = SB_CriaSlct(Typ)
        const data = await SB_GETT(Typ,1,selectStr,null,Id)
        fazJJJ(Typ,data,'Unico') ; AutoCOMP(Typ,data) ; if(Typ=='PDDS'){GAMBIARRAA(data)} ; __NULL(data[0])
        LOG('Read_Tr',data)
        $(Tr).outerHTML = Tm_Tr(Typ,data)
    }
</script>
