<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link  href="https://raw.githack.com/InfinityGraff/MyBiblioteca/main/CSSBiblioteca.css" rel="stylesheet">
    <script src="../MyBiblioteca/PreScript.js"></script>
    <link  href="./CssGRAFF.css" rel="stylesheet">
</head>
<style>
    .Basic.Lite{
        --bg:#ffffff;--border:#cccccc;--shadow:0 5px 15px #0000001a;}
    .Basic.Dark{
        --bg:#1e1e1e;--border:#444444;--shadow:0 5px 15px #00000080;}

    /*CALENDAR*/
    body       {background:var(--BodyBk   ) ; color:var(--BodyTx      )}
    .Tag_Off   {background:var(--Tag_Off  ) ; color:var(--Tag_Off_Tx  )} /*Tag Off*/
    .Tag_Range {background:var(--TagRngBk ) ; color:var(--TagRngTx    )} /*Tag Range*/
    .Tag_destk {background:var(--Tag_dstk ) ; color:var(--Tag_dstk_Tx )} /*Tag em Destaque Básico*/
    .Tag_DESTK {background:var(--Tag_DESTK) ; color:var(--Tag_DESTK_Tx)} /*Tag em Destaque*/
    .Tag_Atv   {background:var(--Tag_Atv  ) ; color:var(--Tag_Atv_Tx  )} /*Tag Ativa*/

    .DateBox{width:220px;font-family:sans-serif}
    input   {width:100%;padding:8px;border:1px solid #ccc;border-radius:6px}

    .calendar         {background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;box-shadow:var(--shadow);gap:5px}
    .calendar table   {width:100%;border-collapse:collapse} /*isso aqui é do Projeto Atual*/
    .calendar td      {text-align:center;padding:6px;cursor:pointer;border-radius:4px} /*este comportamento deve mudar conforme os Estilos*/
    .calendar tr:not(.NONO) td:hover{background:var(--TagHovBk);color:var(--TagHovTx)} /*Hov mesmo*/
    .calendar .NONO       {background:var(--Tag_dstk) ; color:var(--Tag_dstk_Tx )}
    .calendar button      {background:var(--BtnBk)    ; color:var(--BtnTx);cursor:pointer;border:none;padding:4px 8px;border-radius:4px}
    .calendar button:hover{background:var(--BtnHovBk) ; color:var(--BtnHovTx)}
    
</style>

<body class="Basic Dark Ct">
    <div class="DateBox Rltv">
        <input placeholder="dd/mm/aaaa" onclick="Tog_N($('.calendar',Pai(this)));Calendario(this,$('.calendar',Pai(this)))">
        <div class="calendar Abslt Cl none"></div>
    </div>
    <div class="DateBox">
        <input placeholder="dd/mm/aaaa" onclick="Tog_N($('.calendar',Pai(this)));Calendario(this,$('.calendar',Pai(this)))">
        <div class="calendar Abslt Cl none"></div>
    </div>
</body>


</html>
